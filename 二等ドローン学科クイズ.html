  const fb=$('fb'); fb.className='fb'; fb.innerHTML='';
  $('next').style.display='none';
  if(isTest) saveActiveTest();
}
function answerQ(sel,btn){
  const q=session[idx];
  document.querySelectorAll('#opts .opt').forEach((b,i)=>{ b.disabled=true; if(i+1===q.ans) b.classList.add('ok'); });
  const ok=(sel===q.ans);
  session[idx].got=ok;
  if(ok) score++; else { btn.classList.add('ng'); sessionWrong.push(q); }
  // 認定テストは別枠。通常の学習記録（科目別の学習状況）には合算しない
  if(!isTest){
    const p=progress[q.id]||{a:0,c:0,last:''};
    p.a++; if(ok) p.c++; p.last=ok?'o':'x'; progress[q.id]=p; LS.set('dq_progress',progress);
  } else {
    const h=getHistory(); const rec=h[h.length-1];
    if(rec && !rec.completed){ rec.cur_round=testRound; rec.answered=idx+1; rec.total=session.length;
      rec.updated_at=new Date().toISOString(); setHistory(h); }
  }
  const fb=$('fb'); fb.className='fb show '+(ok?'ok':'ng');
  fb.innerHTML='<div class="hd">'+(ok?'✅ 正解！':'❌ 不正解')+'（正解：'+q.ans+'）</div>'+esc(q.explanation);
  $('sc').textContent='正解 '+score;
  const nb=$('next'); nb.style.display='block';
  nb.textContent=(idx+1<session.length)?'次へ ▶':'結果を見る ▶';
}
function nextQ(){ idx++; if(idx<session.length) renderQ(); else showResult(); }
function showResult(){
  if(isTest){ showTestResult(); return; }
  show('result');
  $('retryBtn').style.display=''; $('retryBtn').textContent='もう一度'; $('retryBtn').onclick=retry;
  const pct=Math.round(score/session.length*100);
  $('final').innerHTML=score+' / '+session.length+'<small>正答率 '+pct+'%</small>';
  const rv=$('review');
  if(!sessionWrong.length){ rv.innerHTML='<p style="text-align:center">全問正解！おめでとうございます 🎉</p>'; }
  else { rv.innerHTML='<h3>復習（今回の不正解）</h3>'+sessionWrong.map(q=>
    '<div class="rev"><div class="q">［'+q.chapter+'］'+esc(q.stem)+'</div>'+
    '<div><b style="color:var(--accent)">正解：'+q.ans+'</b> '+esc(q.opts[q.ans-1])+'</div>'+
    '<div style="color:var(--mut);font-size:.85rem;margin-top:4px">'+esc(q.explanation)+'</div></div>').join(''); }
  syncProgress();
}

function showTestResult(){
  show('result');
  // 初回ラウンドの正答（得点・科目別）を記録
  if(testRound===1){
    testFirstScore=score;
    testFirstDetail={};
    CHAPTERS.forEach(function(c){ testFirstDetail[c.key]={correct:0,total:0}; });
    session.forEach(function(q){ const d=testFirstDetail[q.chapter]; if(d){ d.total++; if(q.got) d.correct++; } });
  }
  // 履歴の現在の試行を更新
  const h=getHistory(); let rec=h[h.length-1];
  if(!rec || rec.completed){ rec={n:completedCount()+1, first_score:null, detail:null, rounds:0, completed:false, completed_at:null, cur_round:1, answered:0, total:40}; h.push(rec); }
  if(testRound===1){ rec.first_score=testFirstScore; rec.detail=testFirstDetail; }
  rec.rounds=testRound; rec.updated_at=new Date().toISOString();
  const remain=sessionWrong.slice();
  const rb=$('retryBtn');
  if(remain.length===0){
    // 全問正解 → 修了
    rec.completed=true; rec.completed_at=new Date().toISOString(); rec.answered=rec.total;
    setHistory(h); clearActiveTest(); syncTest();
    $('final').innerHTML='🎉 '+rec.n+'回目 修了！<small>40問すべて正解しました（初回正答 '+testFirstScore+' / 40・'+testRound+'ラウンドで達成）</small>';
    let html='<h3>初回の科目別正答</h3>';
    CHAPTERS.forEach(function(c){ const d=testFirstDetail[c.key];
      html+='<div class="rev"><b>'+c.no+'　'+esc(c.name)+'</b>：'+d.correct+' / '+d.total+'</div>'; });
    $('review').innerHTML=html;
    rb.style.display='none'; rb.onclick=retry;
  } else {
    // まだ間違いあり → 次ラウンドを準備（中断しても次ラウンドから再開できる）
    const roundTotal=session.length, roundCorrect=roundTotal-remain.length;
    prepareNextRound(remain);
    rec.cur_round=testRound; rec.answered=0; rec.total=session.length;
    setHistory(h); saveActiveTest(); syncTest();
    $('final').innerHTML=roundCorrect+' / '+roundTotal+'<small>正解 — 残り '+remain.length+' 問を全問正解すると修了です</small>';
    let html='<h3>もう一度挑戦する問題（解説）</h3>'+remain.map(function(q){
      return '<div class="rev"><div class="q">［'+q.chapter+'］'+esc(q.stem)+'</div>'+
      '<div><b style="color:var(--accent)">正解：'+q.ans+'</b> '+esc(q.opts[q.ans-1])+'</div>'+
      '<div style="color:var(--mut);font-size:.85rem;margin-top:4px">'+esc(q.explanation)+'</div></div>'; }).join('');
    $('review').innerHTML=html;
    rb.style.display=''; rb.textContent='間違いを再挑戦（'+remain.length+'問）'; rb.onclick=goNextRound;
  }
}

/* ---- DB同期（ログイン時のみ・Supabase）---- */
function currentUserId(){ return (window.__user && window.__user.id) || null; }
function chapterStatsObj(){
  const prog=LS.get('dq_progress',{}); const out={};
  CHAPTERS.forEach(function(c){ out[c.key]={learned:0,ok:0,ng:0}; });
  DATA.forEach(function(q){ const p=prog[q.id]; if(p){ const o=out[q.chapter]; o.learned++;
    if(p.last==='o') o.ok++; else if(p.last==='x') o.ng++; } });
  return out;
}
function syncProgress(){
  const uid=currentUserId(); if(!uid || !window.__sb) return;
  window.__sb.from('user_progress').upsert({user_id:uid, stats:chapterStatsObj(),
    updated_at:new Date().toISOString()}).then(function(){},function(){});
}
function computeTestScalars(){
  const h=getHistory(); const comp=h.filter(function(x){return x.completed;});
  let best=0, last=null, passedAt=null;
  h.forEach(function(x){ if(x.first_score!=null){ best=Math.max(best,x.first_score); last=x.first_score; } });
  if(comp.length){ passedAt=comp[comp.length-1].completed_at; }
  return {attempts:comp.length, best:best, last:last, passed:comp.length>0, passedAt:passedAt};
}
function syncTest(){
  const uid=currentUserId(); if(!uid || !window.__sb) return;
  const s=computeTestScalars();
  window.__sb.from('user_progress').upsert({
    user_id:uid, stats:chapterStatsObj(), test_history:getHistory(),
    test_attempts:s.attempts, test_last_score:s.last, test_best_score:s.best,
    test_passed:s.passed, test_passed_at:s.passedAt, updated_at:new Date().toISOString()
  }).then(function(){},function(){});
}
function renderTestCard(){
  const h=getHistory(); const comp=h.filter(function(x){return x.completed;});
  $('tAttempts').textContent=comp.length;
  let best=0, any=false; h.forEach(function(x){ if(x.first_score!=null){ best=Math.max(best,x.first_score); any=true; } });
  $('tBest').textContent=any ? (best+' / 40') : '–';
  const s=$('testStatus'); const inProg=curAttempt();
  if(inProg){ s.textContent=inProg.n+'回目 挑戦中'; s.className='tpill ng'; }
  else if(comp.length){ s.textContent='修了 '+comp.length+'回'; s.className='tpill ok'; }
  else { s.textContent='未受験'; s.className='tpill none'; }
  const active=LS.get('dq_test_active',null);
  const bw=$('testBtns');
  if(active && inProg){
    bw.innerHTML='<button class="btn" style="width:auto;margin:0" onclick="resumeTest()">続きから再開（'+inProg.n+'回目）</button>'+
      '<button class="btn sec" style="width:auto;margin:0" onclick="startTest()">最初から</button>';
  } else {
    bw.innerHTML='<button class="btn" style="width:auto;margin:0" onclick="startTest()">'+(comp.length?((comp.length+1)+'回目を開始'):'認定テストを開始')+'</button>';
  }
}
window.DQonAuth=function(){ syncProgress(); syncTest(); };
function resetProgress(){
  if(confirm('この端末の学習記録（進捗・要復習）をすべて消去します。よろしいですか？')){
    progress={}; LS.set('dq_progress',progress); syncProgress(); renderHome();
  }
}

/* ---- wire settings ---- */
document.querySelectorAll('.dot').forEach(d=>d.onclick=function(){ applyTheme(d.dataset.t); });
document.querySelectorAll('#numSeg button').forEach(b=>b.onclick=function(){ settings.num=parseInt(b.dataset.n,10); LS.set('dq_settings',settings); renderHome(); });
$('shOpts').onchange=function(e){ settings.shuffleOpts=e.target.checked; LS.set('dq_settings',settings); };
$('shQs').onchange =function(e){ settings.shuffleQs =e.target.checked; LS.set('dq_settings',settings); };

/* ---- init ---- */
applyTheme(theme);
renderHome();
</script>
