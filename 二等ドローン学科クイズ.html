<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>二等ドローン学科クイズ</title>
<style>
  :root{
    --accent:#2563eb; --accent-soft:#dbeafe;
    --bg:#eef2f7; --card:#ffffff; --ink:#0f172a; --mut:#64748b; --line:#e2e8f0;
    --ok:#16a34a; --ng:#dc2626; --warnbg:#fee2e2; --warnink:#b91c1c;
    --barA:#f59e0b; --barB:#22c55e;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; }
  body{ font-family:"Yu Gothic","Hiragino Kaku Gothic ProN","Meiryo",system-ui,sans-serif;
        background:var(--bg); color:var(--ink); line-height:1.7; -webkit-font-smoothing:antialiased; }
  .top{ background:var(--card); border-bottom:1px solid var(--line); }
  .top .in{ max-width:980px; margin:0 auto; padding:12px 18px; display:flex; align-items:center; gap:12px; }
  .logo{ width:38px; height:38px; border-radius:11px; background:var(--accent); color:#fff;
         display:grid; place-items:center; font-size:20px; flex:none; }
  .brand b{ display:block; font-size:1rem; line-height:1.3; }
  .brand span{ font-size:.74rem; color:var(--mut); }
  .themes{ margin-left:auto; display:flex; align-items:center; gap:8px; }
  .themes label{ font-size:.74rem; color:var(--mut); margin-right:2px; }
  .dot{ width:20px; height:20px; border-radius:50%; border:2px solid #fff; outline:1.5px solid var(--line);
        cursor:pointer; padding:0; }
  .dot.active{ outline:2px solid var(--ink); transform:scale(1.12); }
  .wrap{ max-width:980px; margin:0 auto; padding:26px 18px 70px; }
  h1.title{ font-size:1.7rem; margin:6px 0 6px; font-weight:800; letter-spacing:.01em; }
  .lead{ color:var(--mut); margin:0 0 22px; font-size:.92rem; }
  .card{ background:var(--card); border:1px solid var(--line); border-radius:16px; padding:22px;
         box-shadow:0 2px 10px rgba(15,23,42,.04); }
  .sec-h{ font-size:1.05rem; font-weight:700; margin:30px 0 12px; display:flex; align-items:baseline; gap:10px; }
  .sec-h small{ font-weight:400; font-size:.78rem; color:var(--mut); }

  /* dashboard stats */
  .dash{ display:flex; align-items:center; gap:26px; flex-wrap:wrap; }
  .ring{ position:relative; width:118px; height:118px; flex:none; }
  .ring .lab{ position:absolute; inset:0; display:grid; place-items:center; text-align:center; line-height:1.1; }
  .ring .lab b{ font-size:1.3rem; font-weight:800; line-height:1.05; }
  .ring .lab span{ font-size:.66rem; color:var(--mut); line-height:1; margin-top:1px; }
  .stats{ display:flex; gap:30px; flex-wrap:wrap; }
  .stat b{ display:block; font-size:1.7rem; font-weight:800; }
  .stat b small{ font-size:.8rem; color:var(--mut); font-weight:600; }
  .stat span{ font-size:.78rem; color:var(--mut); }
  .stat.warn b{ color:var(--ng); }

  /* chapter cards */
  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .chap{ text-align:left; background:var(--card); border:1px solid var(--line); border-radius:14px;
         padding:16px 16px 14px; cursor:pointer; transition:.15s; }
  .chap:hover{ border-color:var(--accent); box-shadow:0 4px 14px rgba(37,99,235,.10); transform:translateY(-1px); }
  .chap .row1{ display:flex; align-items:flex-start; gap:9px; }
  .badge{ flex:none; font-size:.72rem; font-weight:700; color:#fff; background:var(--accent);
          padding:3px 9px; border-radius:7px; }
  .chap .nm{ font-weight:700; font-size:.98rem; line-height:1.4; }
  .weak{ margin-left:auto; flex:none; font-size:.7rem; font-weight:700; color:var(--warnink);
         background:var(--warnbg); padding:2px 8px; border-radius:99px; }
  .chap .meta2{ color:var(--mut); font-size:.78rem; margin:9px 0 8px; }
  .pbar{ display:flex; align-items:center; gap:10px; }
  .pbar .track{ flex:1; height:7px; background:var(--line); border-radius:99px; overflow:hidden; }
  .pbar .fill{ height:100%; background:linear-gradient(90deg,var(--barA),var(--barB)); border-radius:99px; width:0; }
  .pbar .pct{ font-size:.78rem; font-weight:700; color:var(--mut); min-width:34px; text-align:right; }

  /* quick start */
  .grid3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; }
  .qs{ text-align:left; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:18px;
       cursor:pointer; transition:.15s; }
  .qs:hover{ border-color:var(--accent); box-shadow:0 4px 14px rgba(37,99,235,.10); transform:translateY(-1px); }
  .qs[disabled]{ opacity:.5; cursor:not-allowed; }
  .qs .ic{ width:40px; height:40px; border-radius:11px; background:var(--accent-soft); color:var(--accent);
           display:grid; place-items:center; font-size:20px; margin-bottom:12px; }
  .qs .t{ font-weight:700; font-size:1rem; }
  .qs .d{ color:var(--mut); font-size:.78rem; margin-top:3px; }

  /* settings */
  .setrow{ display:flex; align-items:center; gap:26px; flex-wrap:wrap; }
  .setrow .lab{ font-size:.82rem; font-weight:600; margin-right:4px; }
  .seg{ display:inline-flex; border:1px solid var(--line); border-radius:10px; overflow:hidden; }
  .seg button{ font:inherit; border:none; background:var(--card); color:var(--ink); padding:8px 14px;
               cursor:pointer; border-right:1px solid var(--line); font-size:.85rem; }
  .seg button:last-child{ border-right:none; }
  .seg button.on{ background:var(--accent); color:#fff; }
  .tg{ display:inline-flex; align-items:center; gap:9px; font-size:.82rem; cursor:pointer; }
  .switch{ width:42px; height:24px; border-radius:99px; background:#cbd5e1; position:relative; transition:.2s; flex:none; }
  .switch::after{ content:""; position:absolute; top:2px; left:2px; width:20px; height:20px; border-radius:50%;
                  background:#fff; transition:.2s; box-shadow:0 1px 3px rgba(0,0,0,.2); }
  .tg input{ display:none; }
  .tg input:checked + .switch{ background:var(--accent); }
  .tg input:checked + .switch::after{ transform:translateX(18px); }

  /* quiz screen */
  .qmeta{ display:flex; justify-content:space-between; color:var(--mut); font-size:.85rem; margin-bottom:8px; }
  .qtrack{ height:6px; background:var(--line); border-radius:99px; overflow:hidden; margin-bottom:18px; }
  .qtrack>div{ height:100%; background:var(--accent); width:0; transition:.3s; }
  .chip{ display:inline-block; font-size:.72rem; padding:3px 10px; border-radius:99px;
         background:var(--accent-soft); color:var(--accent); font-weight:700; }
  .stem{ font-size:1.1rem; font-weight:700; margin:12px 0 18px; }
  .opt{ display:block; width:100%; text-align:left; padding:14px 16px; margin-bottom:11px; font:inherit;
        border:1.5px solid var(--line); border-radius:12px; background:var(--card); color:var(--ink); cursor:pointer; transition:.15s; }
  .opt:hover:not(:disabled){ border-color:var(--accent); }
  .opt:disabled{ cursor:default; }
  .opt .n{ display:inline-block; width:1.7em; font-weight:800; color:var(--accent); }
  .opt.ok{ border-color:var(--ok); background:#f0fdf4; }
  .opt.ng{ border-color:var(--ng); background:#fef2f2; }
  .fb{ margin-top:6px; padding:15px; border-radius:12px; font-size:.92rem; display:none; }
  .fb.show{ display:block; }
  .fb.ok{ background:#f0fdf4; border:1px solid var(--ok); }
  .fb.ng{ background:#fef2f2; border:1px solid var(--ng); }
  .fb .hd{ font-weight:800; margin-bottom:4px; }
  .fb.ok .hd{ color:var(--ok); } .fb.ng .hd{ color:var(--ng); }
  .btn{ display:inline-block; width:100%; padding:14px; border:none; border-radius:12px; font:inherit;
        background:var(--accent); color:#fff; font-weight:700; cursor:pointer; margin-top:16px; font-size:1rem; }
  .btn:hover{ filter:brightness(1.06); }
  .btn.sec{ background:#e2e8f0; color:var(--ink); }
  .btns{ display:flex; gap:12px; }

  /* result */
  .score{ font-size:2.6rem; font-weight:800; text-align:center; margin:8px 0; }
  .score small{ display:block; font-size:1rem; color:var(--mut); font-weight:600; }
  .rev{ border-top:1px solid var(--line); padding-top:12px; margin-top:12px; font-size:.9rem; }
  .rev .q{ color:var(--mut); }

  .tpill{ font-size:.74rem; font-weight:700; padding:3px 11px; border-radius:99px; }
  .tpill.ok{ background:#dcfce7; color:#16a34a; }
  .tpill.ng{ background:#fee2e2; color:#dc2626; }
  .tpill.none{ background:#e2e8f0; color:#64748b; }
  footer{ text-align:center; color:var(--mut); font-size:.75rem; margin-top:30px; }
  footer a{ color:var(--accent); }
  .hide{ display:none !important; }
  @media(max-width:680px){
    .grid2,.grid3{ grid-template-columns:1fr; }
    h1.title{ font-size:1.4rem; }
    .stats{ gap:20px; }
  }
</style>
</head>
<body>
<div class="top"><div class="in">
  <div class="logo">✦</div>
  <div class="brand"><b>二等学科クイズ</b><span>無人航空機操縦士 試験対策</span></div>
  <div class="themes">
    <label>テーマ</label>
    <button class="dot" data-t="blue"   style="background:#2563eb" title="ブルー"></button>
    <button class="dot" data-t="teal"   style="background:#0d9488" title="ティール"></button>
    <button class="dot" data-t="orange" style="background:#ea580c" title="オレンジ"></button>
  </div>
  <div id="acctbar" style="display:none;align-items:center;gap:10px">
    <span id="acct" style="font-size:.8rem;color:var(--mut);font-weight:600"></span>
    <a id="adminLink" href="管理者画面.html" class="btn sec" style="display:none;width:auto;margin:0;padding:6px 12px;font-size:.8rem;text-decoration:none">管理者画面</a>
    <button id="logout" class="btn sec" style="width:auto;margin:0;padding:6px 12px;font-size:.8rem">ログアウト</button>
  </div>
</div></div>

<div class="wrap">

  <div id="authgate"></div>

  <div id="app" style="display:none">

  <!-- ===== HOME ===== -->
  <div id="home">
    <h1 class="title">二等 無人航空機操縦士 学科対策</h1>
    <p class="lead">全200問・三肢択一。1問ずつ解いてその場で解説を確認できます。</p>

    <div class="sec-h" style="margin-top:6px">認定テスト <small>4科目×10問＝40問。間違えた問題を全問正解するまで反復して修了</small></div>
    <div class="card" id="testcard" style="margin-bottom:6px">
      <div style="display:flex;align-items:center;gap:24px;flex-wrap:wrap">
        <span id="testStatus" class="tpill none">未受験</span>
        <div class="stats">
          <div class="stat"><b id="tAttempts">0</b><span>修了回数</span></div>
          <div class="stat"><b id="tBest">–</b><span>初回正答（最高）</span></div>
        </div>
        <div id="testBtns" style="margin-left:auto;display:flex;gap:8px;flex-wrap:wrap"></div>
      </div>
    </div>

    <div class="card">
      <div class="dash">
        <div class="ring">
          <svg width="118" height="118" viewBox="0 0 118 118">
            <circle cx="59" cy="59" r="50" fill="none" stroke="var(--line)" stroke-width="8"/>
            <circle id="ring" cx="59" cy="59" r="50" fill="none" stroke="var(--accent)" stroke-width="8"
                    stroke-linecap="round" stroke-dasharray="314.16" stroke-dashoffset="314.16"
                    transform="rotate(-90 59 59)" style="transition:stroke-dashoffset .5s"/>
          </svg>
          <div class="lab"><b id="accPct">0%</b><span>正答率</span></div>
        </div>
        <div class="stats">
          <div class="stat"><b id="seen">0<small> / 200</small></b><span>学習済みの問題</span></div>
          <div class="stat"><b id="lastok">0</b><span>直近で正解</span></div>
          <div class="stat warn"><b id="todo">0</b><span>要復習</span></div>
        </div>
      </div>
    </div>

    <div class="sec-h">章ごとに学習 <small>タップで出題（出題数は下の設定に従います）</small></div>
    <div class="grid2" id="chaps"></div>

    <div class="sec-h">クイックスタート</div>
    <div class="grid3">
      <button class="qs" onclick="startMini()">
        <div class="ic">🎲</div><div class="t">ミニテスト</div><div class="d">全範囲からランダム出題</div>
      </button>
      <button class="qs" onclick="startAll()">
        <div class="ic">📚</div><div class="t">全200問</div><div class="d">通しで挑戦（出題数設定は無視）</div>
      </button>
      <button class="qs" id="qsReview" onclick="startReview()">
        <div class="ic">🔁</div><div class="t">復習</div><div class="d" id="revDesc">間違いを復習</div>
      </button>
    </div>

    <div class="sec-h">設定</div>
    <div class="card">
      <div class="setrow">
        <span class="lab">1回の出題数</span>
        <div class="seg" id="numSeg">
          <button data-n="10">10</button><button data-n="20">20</button><button data-n="30">30</button>
          <button data-n="50">50</button><button data-n="0">全部</button>
        </div>
        <label class="tg"><input type="checkbox" id="shOpts"><span class="switch"></span>選択肢シャッフル</label>
        <label class="tg"><input type="checkbox" id="shQs"><span class="switch"></span>問題シャッフル</label>
        <button class="btn sec" style="width:auto;margin:0;padding:8px 14px;font-size:.82rem" onclick="resetProgress()">学習記録をリセット</button>
      </div>
    </div>
  </div>

  <!-- ===== QUIZ ===== -->
  <div id="quiz" class="card hide">
    <div class="qmeta"><span id="prog"></span><span id="sc"></span></div>
    <div class="qtrack"><div id="qfill"></div></div>
    <span class="chip" id="chip"></span>
    <div class="stem" id="stem"></div>
    <div id="opts"></div>
    <div class="fb" id="fb"></div>
    <button class="btn" id="next" style="display:none" onclick="nextQ()">次へ ▶</button>
    <button class="btn sec" onclick="goHome()">中断してホームへ</button>
  </div>

  <!-- ===== RESULT ===== -->
  <div id="result" class="card hide">
    <h2 style="margin-top:0">結果</h2>
    <div class="score" id="final"></div>
    <div id="review"></div>
    <div class="btns">
      <button class="btn sec" onclick="goHome()">ホームへ</button>
      <button class="btn" id="retryBtn" onclick="retry()">もう一度</button>
    </div>
  </div>

  </div><!-- /#app -->

  <footer>
    学習用に独自作成したものであり、実際の試験問題とは異なります。<br>
    © 2026 TechnoDroneKurashiki ／ <a href="https://github.com/TechnoDroneKurashiki/drone-license-workbook">GitHub</a>
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
const DATA = [{"id": 1, "chapter": "規則", "stem": "無人航空機操縦者技能証明の制度について、誤っているものを1つ選びなさい。", "options": ["学科試験に合格すれば、実地試験を受けなくても技能証明が交付される。", "技能証明は、一等と二等の二つの資格区分に分かれている。", "技能証明を受けるには、原則として学科試験、実地試験及び身体検査に合格する必要がある。"], "answer": 1, "explanation": "技能証明の取得には学科試験に加えて実地試験（又は登録講習機関の修了審査）及び身体検査への合格が必要であり、学科試験のみでは交付されない。"}, {"id": 2, "chapter": "規則", "stem": "航空法上の無人航空機の定義について、正しいものを1つ選びなさい。", "options": ["機体本体の重量のみで判断し、バッテリーの重量は含めない。", "重量にかかわらず、空中を飛行する模型はすべて無人航空機に含まれる。", "構造上人が乗ることができず、遠隔操作又は自動操縦により飛行させることができる機器で、重量100g以上のものをいう。"], "answer": 3, "explanation": "無人航空機は「人が乗ることができないもののうち、遠隔操作又は自動操縦により飛行させることができるもの」で、機体本体とバッテリーの合計が100g以上のものをいう。100g未満は模型航空機として扱われる。"}, {"id": 3, "chapter": "規則", "stem": "無人航空機の機体登録制度について、誤っているものを1つ選びなさい。", "options": ["重量100g以上の無人航空機は、原則として登録を受けなければ航空の用に供することができない。", "登録の有効期間は無期限であり、一度登録すれば更新は不要である。", "登録記号は機体に表示しなければならない。"], "answer": 2, "explanation": "機体登録の有効期間は登録日から3年であり、継続して使用する場合は更新の手続きが必要となる。"}, {"id": 4, "chapter": "規則", "stem": "リモートID機能について、正しいものを1つ選びなさい。", "options": ["すべての登録機体は、例外なくリモートID機能を備えなければならない。", "リモートIDは飛行ログを地上局に記録するための装置である。", "リモートIDは、機体の識別情報等を電波で発信する仕組みである。"], "answer": 3, "explanation": "リモートIDは登録記号等の識別情報を電波で発信し、機体を遠隔から識別できるようにする仕組みである。事前登録した機体や係留飛行など一定の場合には搭載が免除される。"}, {"id": 5, "chapter": "規則", "stem": "特定飛行に該当する飛行として、誤っているものを1つ選びなさい。", "options": ["人口集中地区（DID）の上空における飛行。", "人口集中地区に該当しない山間部での、地表から高度30mの目視内飛行。", "夜間（日没後から日出まで）の飛行。"], "answer": 2, "explanation": "人口集中地区外で、空港周辺や150m以上等の制限にもかからない目視内・昼間の飛行は特定飛行に該当しない。DID上空や夜間飛行は特定飛行に当たる。"}, {"id": 6, "chapter": "規則", "stem": "飛行の許可・承認について、正しいものを1つ選びなさい。", "options": ["二等技能証明を取得すれば、いかなる特定飛行も許可・承認なしで実施できる。", "特定飛行を行う場合は、原則として国土交通大臣の許可又は承認が必要である。", "立入管理措置を講じれば、空港周辺での飛行も常に許可不要となる。"], "answer": 2, "explanation": "特定飛行は原則として許可又は承認を要する。技能証明と機体認証があり立入管理措置を講じる等の条件を満たす飛行（カテゴリーⅡの一部）で許可・承認が不要になる場合があるが、すべての特定飛行が免除されるわけではない。"}, {"id": 7, "chapter": "規則", "stem": "飛行カテゴリーの区分について、誤っているものを1つ選びなさい。", "options": ["カテゴリーⅡの飛行は、二等技能証明では一切実施できない。", "カテゴリーⅠは特定飛行に該当しない飛行で、許可・承認を要しない。", "カテゴリーⅢは第三者の上空で行う立入管理措置を講じない飛行である。"], "answer": 1, "explanation": "二等技能証明はカテゴリーⅡの飛行を主たる対象とする資格である。第三者上空（立入管理措置を講じない）のカテゴリーⅢは一等技能証明等が必要となる。"}, {"id": 8, "chapter": "規則", "stem": "機体認証制度について、正しいものを1つ選びなさい。", "options": ["機体認証には第一種と第二種があり、第一種はカテゴリーⅢ飛行に対応する。", "機体認証の有効期間は、第一種・第二種ともに無期限である。", "機体認証は機体の所有者を公的に証明するための制度である。"], "answer": 1, "explanation": "第一種機体認証はカテゴリーⅢ飛行に、第二種はカテゴリーⅡ飛行に対応する。有効期間は第一種が1年、第二種が3年であり、所有者の証明は登録制度の役割である。"}, {"id": 9, "chapter": "規則", "stem": "飛行計画の通報について、誤っているものを1つ選びなさい。", "options": ["過去に飛行した実績のある場所であれば、飛行計画の通報は一切不要である。", "特定飛行を行う場合は、飛行前に飛行計画を通報する必要がある。", "飛行計画はドローン情報基盤システム（DIPS）を通じて通報する。"], "answer": 1, "explanation": "特定飛行では飛行のたびに飛行計画の通報が必要であり、過去の飛行実績があっても省略できない。"}, {"id": 10, "chapter": "規則", "stem": "飛行日誌について、正しいものを1つ選びなさい。", "options": ["飛行日誌は飛行記録、日常点検記録、点検整備記録から構成される。", "飛行日誌は趣味の飛行に限り作成が義務付けられている。", "飛行日誌は飛行後に廃棄してよく、保存の義務はない。"], "answer": 1, "explanation": "飛行日誌は飛行記録・日常点検記録・点検整備記録で構成され、特定飛行を行う者は作成・保存の義務を負う。"}, {"id": 11, "chapter": "規則", "stem": "事故等が発生した場合の対応について、誤っているものを1つ選びなさい。", "options": ["人の死傷や第三者の物件の損壊などの事故が発生した場合、国土交通大臣への報告が必要である。", "負傷者がいる場合は、救護や消防・警察への通報など危険防止の措置を行う。", "事故が発生した場合の報告先は、国家公安委員会である。"], "answer": 3, "explanation": "事故等の報告先は国土交通大臣である。負傷者の救護や警察・消防への通報は別途必要となる。"}, {"id": 12, "chapter": "規則", "stem": "小型無人機等飛行禁止法について、正しいものを1つ選びなさい。", "options": ["この法律は航空法と同一の法律であり、内容も同じである。", "重量100g未満の機体はこの法律の対象外である。", "国の重要な施設や外国公館等の周辺地域上空での飛行を禁止している。"], "answer": 3, "explanation": "小型無人機等飛行禁止法は、国会議事堂・内閣総理大臣官邸・原子力事業所・外国公館等の重要施設周辺の上空飛行を禁止する航空法とは別の法律で、重量にかかわらず対象となる。"}, {"id": 13, "chapter": "規則", "stem": "電波法と無人航空機について、誤っているものを1つ選びなさい。", "options": ["一般的なホビー用ドローンの操縦用電波（2.4GHz帯）は、技術基準適合証明（技適）を受けた機器であれば免許不要で使用できる。", "技適マークのない海外製の無線機器でも、国内で自由に使用してよい。", "5.7GHz帯など一部の周波数を使用するには、無線局の免許や資格が必要となる場合がある。"], "answer": 2, "explanation": "技術基準適合証明（技適）を受けていない無線機器を国内で使用することは電波法違反となるおそれがある。"}, {"id": 14, "chapter": "規則", "stem": "飛行自粛要請空域について、正しいものを1つ選びなさい。", "options": ["法律で飛行が一律に禁止された空域である。", "大規模災害時など、関係機関から飛行の自粛が要請されることがある空域である。", "自粛要請は法的拘束力をもつため、違反すると必ず刑事罰を受ける。"], "answer": 2, "explanation": "飛行自粛要請空域は、災害対応等のため関係機関から飛行の自粛が要請される空域であり、要請に応じて飛行を控えることが求められる。"}, {"id": 15, "chapter": "規則", "stem": "人又は物件との距離（30mルール）について、誤っているものを1つ選びなさい。", "options": ["第三者や第三者の物件との間に30m以上の距離を確保できない飛行は特定飛行に該当する。", "ここでいう「人」には、無人航空機の飛行に関係する者は含まれない。", "30mの距離は機体の真下の地表からの高さで判断する。"], "answer": 3, "explanation": "30mルールは機体と人・物件との間の水平・垂直を含む実距離で判断するもので、真下の高さのみで判断するものではない。関係者は対象に含まれない。"}, {"id": 16, "chapter": "規則", "stem": "催し物上空での飛行について、正しいものを1つ選びなさい。", "options": ["催し物上空の飛行は二等技能証明があれば常に承認不要である。", "催し物上空の飛行は人がいなければ特定飛行に当たらない。", "多数の者が集まる催し物の上空での飛行は特定飛行に該当する。"], "answer": 3, "explanation": "祭礼や縁日など多数の者が集まる催し物の上空での飛行は特定飛行であり、原則として承認が必要となる。"}, {"id": 17, "chapter": "規則", "stem": "危険物の輸送及び物件投下について、誤っているものを1つ選びなさい。", "options": ["水や農薬の散布は液体であるため、物件投下には一切該当しない。", "火薬類や引火性液体などの危険物の輸送は特定飛行に該当する。", "無人航空機からの物件投下は特定飛行に該当する。"], "answer": 1, "explanation": "無人航空機からの物件投下には農薬等の液体や粒状物の散布も含まれ、特定飛行に該当する。"}, {"id": 18, "chapter": "規則", "stem": "立入管理措置について、正しいものを1つ選びなさい。", "options": ["立入管理措置を講じた飛行はカテゴリーⅢに分類される。", "立入管理措置とは、第三者が飛行経路下に立ち入らないよう、看板やコーンの設置、補助者の配置等を行う措置である。", "立入管理措置は夜間飛行のときのみ必要である。"], "answer": 2, "explanation": "立入管理措置は第三者の立入りを制限する措置で、これを講じる飛行はカテゴリーⅡに分類される。"}, {"id": 19, "chapter": "規則", "stem": "アルコール又は薬物に関する規定について、誤っているものを1つ選びなさい。", "options": ["飲酒後であっても、本人が「酔っていない」と感じれば飛行させてよい。", "アルコール等の影響により正常な飛行ができないおそれがある間は飛行させてはならない。", "風邪薬など、眠気等を生じさせる薬物の影響下での飛行も避けるべきである。"], "answer": 1, "explanation": "主観的な判断にかかわらず、アルコールの影響が残る間の飛行は禁止されている。体内にアルコールを保有した状態での飛行は認められない。"}, {"id": 20, "chapter": "規則", "stem": "無人航空機の運航ルール（遵守事項）について、正しいものを1つ選びなさい。", "options": ["飛行させる際は、当該無人航空機の周囲の状況を確認した上で飛行させなければならない。", "飛行前の機体点検は、業務利用の場合のみ義務付けられている。", "アルコールを保有していなければ、飛行前のアルコールチェックは一切不要である。"], "answer": 1, "explanation": "飛行前の周囲確認や機体点検は飛行の目的にかかわらず遵守事項として求められる。点検は趣味・業務を問わず必要である。"}, {"id": 21, "chapter": "システム", "stem": "無人航空機の機体の種類について、誤っているものを1つ選びなさい。", "options": ["マルチローターは複数の回転翼の回転数を変化させて姿勢を制御する。", "固定翼機（飛行機型）は、主翼に発生する揚力で飛行する。", "ヘリコプター型（シングルローター）は、ローターをもたず推進プロペラのみで飛行する。"], "answer": 3, "explanation": "ヘリコプター型はメインローターの回転により揚力を得て飛行する。ローターをもたず推進プロペラのみで飛行するのは固定翼機である。"}, {"id": 22, "chapter": "システム", "stem": "マルチローターの飛行原理について、正しいものを1つ選びなさい。", "options": ["隣り合うローターを互いに逆方向に回転させ、機体全体の反トルクを相殺している。", "すべてのローターを同一方向に回転させ、反トルクを打ち消している。", "前進する際はローターを傾けるのではなく、機体重量を増やして加速する。"], "answer": 1, "explanation": "マルチローターは隣り合うローターを逆回転させることで反トルクを相殺している。前進は機体を傾けて推力の水平成分を生み出すことで行う。"}, {"id": 23, "chapter": "システム", "stem": "フライトコントロールシステム（FC）について、誤っているものを1つ選びなさい。", "options": ["FCは操縦者の送信機操作を一切受け付けず、完全に自律でのみ動作する。", "各種センサの情報をもとに、モーターの回転を制御して機体の姿勢を保つ。", "ジャイロや加速度センサ等の情報を統合して機体の状態を把握する。"], "answer": 1, "explanation": "FCはセンサ情報に加えて操縦者の送信機からの指令も受け取り、両者を統合して機体を制御する。"}, {"id": 24, "chapter": "システム", "stem": "無人航空機の動力源であるバッテリーについて、正しいものを1つ選びなさい。", "options": ["リチウムポリマー（LiPo）バッテリーは過充電・過放電に強く、扱いに注意は不要である。", "リチウムポリマーバッテリーは、低温環境下では性能（容量・電圧）が低下しやすい。", "膨らんだ（膨張した）バッテリーでも、飛行に支障がなければそのまま使用してよい。"], "answer": 2, "explanation": "LiPoバッテリーは低温で性能が低下しやすく、過充電・過放電や物理的損傷により発火の危険がある。膨張したバッテリーは使用せず適切に処分する。"}, {"id": 25, "chapter": "システム", "stem": "GNSS（衛星測位システム）について、誤っているものを1つ選びなさい。", "options": ["複数の測位衛星からの電波を受信して機体の位置を測定する。", "高い建物に囲まれた場所や橋の下では、測位精度が低下することがある。", "GNSSの電波は遮蔽物の影響を受けないため、屋内でも常に安定して受信できる。"], "answer": 3, "explanation": "GNSSは衛星からの電波を利用するため、屋内や高層建築物の谷間、橋の下などでは受信状態が悪化し測位精度が低下することがある。"}, {"id": 26, "chapter": "システム", "stem": "機体の磁気方位（コンパス）について、正しいものを1つ選びなさい。", "options": ["地磁気センサは外部環境の影響を受けないため、キャリブレーションは不要である。", "コンパスの異常は飛行性能に影響しないので無視してよい。", "鉄筋や鉄塔、高圧線など磁気を乱す環境の近くでは、方位の誤差が生じやすい。"], "answer": 3, "explanation": "地磁気センサは周囲の磁性体や強い電流の影響を受けやすく、誤差が生じると機体が意図しない方向へ流れることがあるため、キャリブレーションや環境確認が重要である。"}, {"id": 27, "chapter": "システム", "stem": "無人航空機の送信機（プロポ）について、誤っているものを1つ選びなさい。", "options": ["送信機と機体の通信が切れても、機体は必ずその場で安全に着陸するため確認は不要である。", "送信機のスティック操作量に応じて、機体への制御指令が変化する。", "飛行前に送信機のバッテリー残量や各スイッチの状態を確認する。"], "answer": 1, "explanation": "通信途絶（フェールセーフ）時の挙動は機種や設定により異なり、ホバリング・帰還・着陸など様々である。事前の設定確認と送信機の点検は欠かせない。"}, {"id": 28, "chapter": "システム", "stem": "機体の主要な構成要素について、正しいものを1つ選びなさい。", "options": ["プロペラは消耗しないため、点検・交換の対象とならない。", "ESC（電子速度コントローラー）は、FCの指令に応じてモーターの回転数を制御する。", "IMU（慣性計測装置）は機体の位置情報を直接GPSから取得する装置である。"], "answer": 2, "explanation": "ESCはFCからの指令を受けてモーターへの電力を調整し回転数を制御する。プロペラは消耗品であり、IMUは加速度・角速度を計測する装置で位置取得装置ではない。"}, {"id": 29, "chapter": "システム", "stem": "電動機（電動ドローン）の整備・点検・保管について、誤っているものを1つ選びなさい。", "options": ["バッテリーは満充電のまま長期間放置するのが最も望ましい保管方法である。", "飛行前にはプロペラの損傷やネジの緩みなどを点検する。", "不要になったリチウム系バッテリーは、適切な方法で廃棄・リサイクルする。"], "answer": 1, "explanation": "リチウム系バッテリーは満充電や完全放電のままの長期保管を避け、適切な電圧（保管用充電量）で保管することが望ましい。"}, {"id": 30, "chapter": "システム", "stem": "夜間飛行を行う際の機体の装備について、正しいものを1つ選びなさい。", "options": ["夜間飛行では機体の灯火は不要で、操縦者の視力のみで姿勢を判断する。", "障害物との衝突防止のため、赤外線センサの装備が法令で必須とされている。", "機体の姿勢及び方向が正確に視認できる灯火を備える必要がある。"], "answer": 3, "explanation": "夜間飛行では機体の姿勢・方向を視認できる灯火が求められる。赤外線センサは必須装備ではない。"}, {"id": 31, "chapter": "システム", "stem": "目視外飛行に関する装備や要件について、誤っているものを1つ選びなさい。", "options": ["目視外飛行では、補助者の配置や安全確保のための体制は一切不要である。", "カメラ映像等により機体や周囲の状況を確認できることが求められる。", "機体の位置・高度・速度等を地上で把握できる仕組みが求められる。"], "answer": 1, "explanation": "目視外飛行では、機体周辺の状況把握のための装備に加え、補助者の配置や立入管理など安全を確保するための体制が求められる場合がある。"}, {"id": 32, "chapter": "システム", "stem": "無人航空機へのペイロード搭載について、正しいものを1つ選びなさい。", "options": ["ペイロードを増やしても、飛行可能時間や運動性能には影響しない。", "ペイロードの搭載により総重量が増すと、必要な揚力が増え飛行時間が短くなる傾向がある。", "ペイロードは重心位置を考慮せず、どこに取り付けても安定性は変わらない。"], "answer": 2, "explanation": "ペイロードの搭載で総重量が増すと必要な揚力（消費電力）が増し、飛行時間が短くなる。また搭載位置によって重心が変化し、安定性に影響するため重心管理が重要である。"}, {"id": 33, "chapter": "操縦者・運航体制", "stem": "操縦者の義務について、誤っているものを1つ選びなさい。", "options": ["飛行中に異常を感じても、予定の飛行は最後まで完了させなければならない。", "飛行前に外部点検と作動点検により機体の状況を確認する。", "飛行経路下に第三者がいないことなど、周囲の安全を確認してから飛行を開始する。"], "answer": 1, "explanation": "飛行中に異常を感じた場合は、無理に飛行を継続せず安全な場所への着陸など危険回避を優先する。"}, {"id": 34, "chapter": "操縦者・運航体制", "stem": "無人航空機に関する保険について、正しいものを1つ選びなさい。", "options": ["法律上の加入義務はないが、万一の事故に備えて使用実態に即した保険への加入が推奨される。", "無人航空機の保険は、自賠責保険と同様に法律で加入が義務付けられている。", "機体認証を受けた機体は、いかなる損害も国が補償するため保険は不要である。"], "answer": 1, "explanation": "無人航空機の保険は加入義務こそないものの、事故による損害賠償等に備えて任意保険への加入が推奨されている。"}, {"id": 35, "chapter": "操縦者・運航体制", "stem": "離着陸時の操作について、誤っているものを1つ選びなさい。", "options": ["離陸直後は機体が不安定になりやすいため、周囲と機体の状態をよく確認する。", "着陸時は地面効果（地表付近の気流の乱れ）の影響を受けることがある。", "離着陸は風の影響を受けないため、風向き・風速の確認は不要である。"], "answer": 3, "explanation": "離着陸は風の影響を強く受けるため、風向き・風速の確認は重要である。地面効果による挙動変化にも注意する。"}, {"id": 36, "chapter": "操縦者・運航体制", "stem": "手動操縦と自動操縦について、正しいものを1つ選びなさい。", "options": ["自動操縦に設定すれば、操縦者はその場を離れてもよい。", "自動操縦中であっても、操縦者は常に機体を監視し、緊急時には手動へ切り替えられる準備をしておく。", "手動操縦は自動操縦より常に危険であり、習熟する必要はない。"], "answer": 2, "explanation": "自動操縦中も操縦者は機体を監視し、不測の事態に備えて手動操縦へ移行できる態勢を保つ必要がある。手動操縦の習熟も緊急時対応の基礎として重要である。"}, {"id": 37, "chapter": "操縦者・運航体制", "stem": "緊急時の対応について、誤っているものを1つ選びなさい。", "options": ["緊急事態が起きた場合は、まず機体の回収を最優先し、人の安全は後回しにする。", "機体の異常時に備え、緊急着陸地点をあらかじめ想定しておく。", "GPSロスト時など、フェールセーフ機能の挙動を事前に把握しておく。"], "answer": 1, "explanation": "緊急時はまず人（第三者・操縦者自身）の安全確保を最優先し、機体の回収を優先してはならない。"}, {"id": 38, "chapter": "操縦者・運航体制", "stem": "操縦者のパフォーマンスの低下について、正しいものを1つ選びなさい。", "options": ["経験豊富な操縦者は、体調が悪くてもパフォーマンスが低下することはない。", "飛行に集中していれば、長時間連続して操縦しても疲労は蓄積しない。", "疲労や睡眠不足、ストレスは判断力や注意力の低下を招く要因となる。"], "answer": 3, "explanation": "疲労・睡眠不足・ストレス・体調不良はいずれも判断力や注意力を低下させる。経験の有無にかかわらず体調管理が重要である。"}, {"id": 39, "chapter": "操縦者・運航体制", "stem": "CRM（Crew Resource Management）について、誤っているものを1つ選びなさい。", "options": ["CRMは操縦者個人の技量のみを高める考え方で、チームの連携は対象としない。", "操縦者や補助者など、利用可能な人的資源を有効に活用して安全な運航を目指す考え方である。", "関係者間で情報を共有し、円滑な意思疎通を図ることが重要である。"], "answer": 1, "explanation": "CRMは人的資源（クルー）の連携・コミュニケーションを通じて安全を確保する考え方であり、個人技量だけでなくチーム全体の協働を重視する。"}, {"id": 40, "chapter": "操縦者・運航体制", "stem": "補助者の配置について、正しいものを1つ選びなさい。", "options": ["補助者は操縦者の集中を妨げるため、配置しないことが望ましい。", "補助者を配置すれば、操縦者は周囲確認を一切行わなくてよい。", "補助者は周囲の状況や第三者の接近を操縦者に知らせるなど、安全確保の役割を担う。"], "answer": 3, "explanation": "補助者は気象の変化や第三者・障害物の接近を操縦者に伝えるなど、安全確保を補助する役割を担う。操縦者自身の安全確認義務がなくなるわけではない。"}, {"id": 41, "chapter": "操縦者・運航体制", "stem": "飛行前の点検（運航時の確認事項）について、誤っているものを1つ選びなさい。", "options": ["プロペラの破損や緩み、機体のがたつきなどを確認する。", "バッテリーの残量や装着状態を確認する。", "一度問題がなかった機体は、その後の飛行前点検を省略してよい。"], "answer": 3, "explanation": "飛行前点検は飛行のたびに行うべきもので、過去に問題がなかったことを理由に省略してはならない。"}, {"id": 42, "chapter": "リスク管理", "stem": "安全に配慮した飛行と飛行計画について、正しいものを1つ選びなさい。", "options": ["飛行計画では、緊急着陸地点や代替経路をあらかじめ検討しておく。", "経験のある場所であれば、飛行計画の立案は省略してよい。", "飛行計画は飛行当日の天候のみを考慮すればよく、地形や障害物は考慮しなくてよい。"], "answer": 1, "explanation": "飛行計画では緊急着陸地点・代替経路の検討、地形・障害物・気象・周囲の状況などを総合的に考慮する。経験のある場所でも計画の立案は必要である。"}, {"id": 43, "chapter": "リスク管理", "stem": "ハザードとリスクについて、誤っているものを1つ選びなさい。", "options": ["ハザードはすべて完全に除去できるため、リスク評価を行う必要はない。", "ハザードとは、危険を生じさせる潜在的な要因（危険源）のことである。", "リスクとは、ハザードによって生じる被害の重大性と発生可能性の組合せで評価される。"], "answer": 1, "explanation": "すべてのハザードを完全に除去することは現実には困難であり、被害の重大性と発生可能性からリスクを評価し、低減策を講じることが重要である。"}, {"id": 44, "chapter": "リスク管理", "stem": "運航リスクの評価と低減について、正しいものを1つ選びなさい。", "options": ["リスクは飛行前に一度評価すれば、その後の状況変化を考慮する必要はない。", "リスク低減策を講じれば、リスクは必ずゼロになる。", "リスクの低減策には、飛行経路の見直しや立入管理措置、補助者の配置などがある。"], "answer": 3, "explanation": "リスク低減策には経路の見直し、立入管理措置、補助者配置、飛行中止判断などがある。状況変化に応じて継続的に評価し、リスクをゼロにはできない前提で管理する。"}, {"id": 45, "chapter": "リスク管理", "stem": "気象が無人航空機の飛行に及ぼす影響について、正しいものを1つ選びなさい。", "options": ["強風時はホバリングが安定するため、むしろ飛行に適している。", "降雨は電子機器に影響しないため、雨天時の飛行は問題ない。", "低温時はバッテリーの性能が低下し、飛行時間が短くなることがある。"], "answer": 3, "explanation": "低温はバッテリー性能を低下させ飛行時間を短縮させる。強風は機体を不安定にし、降雨は電子機器の故障や墜落の原因となるため避けるべきである。"}, {"id": 46, "chapter": "リスク管理", "stem": "気象情報の確認について、誤っているものを1つ選びなさい。", "options": ["一度晴天を確認すれば、その後の気象変化を確認する必要はない。", "飛行前に最新の天気・風向・風速・降水等の気象情報を収集する。", "気象は時間とともに変化するため、飛行中も空の状況の変化に注意する。"], "answer": 1, "explanation": "気象は刻々と変化するため、飛行前だけでなく飛行中も継続して空模様の変化に注意し、悪化の兆候があれば飛行を中止する。"}, {"id": 47, "chapter": "リスク管理", "stem": "風と地形の影響について、正しいものを1つ選びなさい。", "options": ["上空の風は地表付近より常に弱いため、高度を上げれば安全である。", "建物や樹木の周辺では、風の乱れ（乱気流）が生じやすい。", "ビル風や谷間の吹き下ろしは機体に影響しないため考慮不要である。"], "answer": 2, "explanation": "建物・樹木の周辺やビルの谷間では乱気流が生じやすい。一般に上空ほど風は強くなる傾向があり、地形による風の影響を考慮する必要がある。"}, {"id": 48, "chapter": "リスク管理", "stem": "気温と気圧が飛行性能に及ぼす影響について、誤っているものを1つ選びなさい。", "options": ["高温時は空気密度が低下し、揚力が得にくくなる傾向がある。", "高温時は空気密度が増加するため、飛行性能が向上する。", "標高の高い場所では気圧が低く、空気密度が下がるため飛行性能が低下しやすい。"], "answer": 2, "explanation": "高温時は空気密度が低下し、必要な揚力を得にくくなって飛行性能が低下する傾向がある。標高が高い（気圧が低い）場所でも同様である。"}, {"id": 49, "chapter": "リスク管理", "stem": "機体の種類に応じた運航リスクについて、正しいものを1つ選びなさい。", "options": ["マルチローターは1つのモーターが停止しても、必ず安全に飛行を継続できる。", "固定翼機は失速速度を下回ると揚力を失い墜落するおそれがあるため、速度管理が重要である。", "機体の種類が異なっても、運航上のリスクや注意点はすべて同一である。"], "answer": 2, "explanation": "固定翼機は一定速度（失速速度）を下回ると揚力を失う特性があり速度管理が重要である。機体の種類によりリスクや注意点は異なり、マルチローターのモーター停止も機種・構成により安全継続できるとは限らない。"}, {"id": 50, "chapter": "リスク管理", "stem": "目視外飛行におけるリスク管理について、誤っているものを1つ選びなさい。", "options": ["機体や周囲の状況をカメラ映像等で把握できる体制を整える。", "目視外飛行では操縦者が機体を直接見ないため、第三者の安全は考慮しなくてよい。", "飛行経路上の障害物や電波状況をあらかじめ確認しておく。"], "answer": 2, "explanation": "目視外飛行であっても第三者の安全確保は必須であり、立入管理措置や補助者配置、経路上の状況把握などのリスク管理が一層重要となる。"}, {"id": 51, "chapter": "規則", "stem": "技能証明の限定（条件）について、誤っているものを1つ選びなさい。", "options": ["技能証明には、目視内・昼間・最大離陸重量25kg未満といった限定を付すことができる。", "限定は一度付されると変更できず、生涯にわたり固定される。", "限定を解除するには、所定の限定変更の手続き（講習や審査）が必要となる。"], "answer": 2, "explanation": "技能証明の限定は、所定の限定変更の講習・審査を受けることで解除（変更）できる。"}, {"id": 52, "chapter": "規則", "stem": "技能証明の有効期間について、正しいものを1つ選びなさい。", "options": ["技能証明の有効期間は3年で、更新には実地試験の再受験が必要である。", "技能証明の有効期間は2年で、更新講習を受けることで更新できる。", "技能証明に有効期間の定めはなく、一度取得すれば生涯有効である。"], "answer": 2, "explanation": "技能証明の有効期間は2年で、有効期間内に更新講習を受けることで更新できる。"}, {"id": 53, "chapter": "規則", "stem": "登録記号の表示について、誤っているものを1つ選びなさい。", "options": ["登録記号は、機体の見やすい位置に鮮明に表示しなければならない。", "登録記号は容易に剥がせるシールで一時的に貼っておけばよい。", "最大離陸重量が25kg以上の機体は、25kg未満の機体より大きな文字で表示する必要がある。"], "answer": 2, "explanation": "登録記号は耐久性のある方法で、容易に取り外しや消去ができないように鮮明に表示しなければならない。"}, {"id": 54, "chapter": "規則", "stem": "リモートID機能の搭載が免除される場合について、正しいものを1つ選びなさい。", "options": ["すべての特定飛行において、リモートIDの搭載が免除される。", "リモートIDは一切免除されることがなく、必ず搭載しなければならない。", "あらかじめ国に届け出た飛行経路を係留して飛行させる場合など、一定の条件下で免除されることがある。"], "answer": 3, "explanation": "リモートIDは、事前登録（制度開始前登録）機体、係留飛行、警察・消防等の特定の飛行、十分な強度の紐等で係留する場合など、一定の条件下で搭載が免除される。"}, {"id": 55, "chapter": "規則", "stem": "空港等の周辺空域での飛行について、誤っているものを1つ選びなさい。", "options": ["空港周辺であっても、高度150m未満であれば常に許可なく飛行できる。", "空港やその周辺の進入表面等の上空での飛行は特定飛行に該当する。", "航空機の航行の安全に影響を及ぼすおそれがあるため、原則として許可が必要である。"], "answer": 1, "explanation": "空港等の周辺空域は高度にかかわらず特定飛行に該当し、原則として許可が必要である。"}, {"id": 56, "chapter": "規則", "stem": "高度150m以上の飛行について、正しいものを1つ選びなさい。", "options": ["地表又は水面から150m以上の高度での飛行は特定飛行に該当する。", "高度の基準は海抜（標高）であり、地表からの高さは関係ない。", "150m以上の飛行は、いかなる場合も許可を受けることができない。"], "answer": 1, "explanation": "高度150m以上の飛行は特定飛行であり、原則として許可が必要となる。高度は地表又は水面からの高さで判断する。"}, {"id": 57, "chapter": "規則", "stem": "危険物の輸送に該当するものとして、誤っているものを1つ選びなさい。", "options": ["火薬類や高圧ガス、引火性液体の輸送。", "毒物及び劇物に指定されている薬品の輸送。", "業務に使用する機体自体に必要なバッテリーや、散布用の農薬等の物件。"], "answer": 3, "explanation": "機体の運航に必要なバッテリーや、業務に必要で安全上支障のない物件等は危険物輸送の対象から除かれる。火薬類・高圧ガス・引火性液体・毒劇物等の輸送が危険物輸送に該当する。"}, {"id": 58, "chapter": "規則", "stem": "航空法上の機体の区別について、正しいものを1つ選びなさい。", "options": ["航空機を改造し、人が乗れる構造・性能を有するものでも、無人で飛ばせば無人航空機に分類される。", "100g未満の機体は、無人航空機として登録の対象となる。", "気球やロケットは、航空機にも無人航空機にも該当しない。"], "answer": 3, "explanation": "気球やロケットは航空機にも無人航空機にも該当しない。航空機に近い構造・性能をもつものは無人航空機ではなく航空機に分類され、100g未満は無人航空機に該当しない。"}, {"id": 59, "chapter": "規則", "stem": "飛行のカテゴリーの細分について、誤っているものを1つ選びなさい。", "options": ["カテゴリーⅡの飛行は、第三者の上空を立入管理措置なしで飛行するものである。", "カテゴリーⅡは、立入管理措置を講じて行う特定飛行である。", "カテゴリーⅡのうち、リスクの高い一部の飛行（カテゴリーⅡA）は許可・承認を要する。"], "answer": 1, "explanation": "第三者の上空を立入管理措置なしで飛行するのはカテゴリーⅢである。カテゴリーⅡは立入管理措置を講じて行う特定飛行で、リスクに応じて許可・承認の要否が分かれる。"}, {"id": 60, "chapter": "規則", "stem": "事故及び重大インシデントの報告について、正しいものを1つ選びなさい。", "options": ["機体の紛失（行方不明）や航空機との接近は、報告の対象とならない。", "人の負傷や第三者の物件の損壊を伴う事故は、国土交通大臣への報告が必要である。", "報告が必要なのは人が死亡した場合のみである。"], "answer": 2, "explanation": "人の死傷・第三者物件の損壊等の事故に加え、機体の紛失や航空機との接近・衝突のおそれ等の重大インシデントも国土交通大臣への報告対象となる。"}, {"id": 61, "chapter": "規則", "stem": "無人航空機の事故で操縦者が負う責任について、誤っているものを1つ選びなさい。", "options": ["人を負傷させた場合などには、刑事責任を問われることがある。", "航空法違反があっても、行政処分の対象となることはない。", "損害を与えた相手に対して、民事上の損害賠償責任を負うことがある。"], "answer": 2, "explanation": "航空法違反があった場合、技能証明の取消しや効力停止といった行政処分の対象となり得る。加えて刑事責任・民事責任を問われることもある。"}, {"id": 62, "chapter": "規則", "stem": "飛行の許可・承認の申請について、正しいものを1つ選びなさい。", "options": ["申請は原則としてドローン情報基盤システム（DIPS）を通じてオンラインで行うことができる。", "申請は飛行当日に行えばよく、事前の申請は不要である。", "一度許可を受ければ、内容を問わずすべての飛行に有効である。"], "answer": 1, "explanation": "許可・承認の申請はDIPSを通じて行うことができ、原則として飛行開始予定日の一定期間前までに申請する必要がある。許可の効力は申請した飛行の内容・範囲に限られる。"}, {"id": 63, "chapter": "規則", "stem": "包括的な許可・承認（包括申請）について、誤っているものを1つ選びなさい。", "options": ["一定期間内に反復・継続して特定飛行を行う場合、包括的な許可・承認を受けられることがある。", "包括申請では、飛行の安全を確保するための体制等が審査される。", "包括的な許可を受ければ、飛行のたびの飛行計画の通報も不要となる。"], "answer": 3, "explanation": "包括的な許可・承認を受けても、特定飛行を行う際は飛行ごとに飛行計画の通報が必要である。"}, {"id": 64, "chapter": "規則", "stem": "機体認証と型式認証について、正しいものを1つ選びなさい。", "options": ["機体認証は機体の所有者を登録する制度で、安全基準の確認は行わない。", "型式認証は個々の機体ごとに受ける必要がある。", "型式認証を受けた型式の機体は、機体認証の検査の一部が省略され得る。"], "answer": 3, "explanation": "型式認証は量産される型式に対して安全基準等への適合を確認する制度で、これを受けた型式の機体は機体認証の検査の一部が省略され得る。機体認証は機体が安全基準に適合することを確認する制度である。"}, {"id": 65, "chapter": "規則", "stem": "無人航空機で用いる無線設備の取扱いについて、誤っているものを1つ選びなさい。", "options": ["5.7GHz帯の無線設備を業務で使用する場合、無線局の免許や無線従事者の資格が必要となることがある。", "技適を受けた無線設備でも、無断で内部を改造すると技適の効力が失われるおそれがある。", "技適を受けた無線設備は、送信出力を自由に増大させて使用してよい。"], "answer": 3, "explanation": "技適を受けた無線設備でも、無断の改造や送信出力の増大は技術基準への不適合を招き、技適の効力が失われるおそれがある。5.7GHz帯等の業務利用には無線局免許や無線従事者資格が必要となる場合がある。"}, {"id": 66, "chapter": "規則", "stem": "アマチュア無線によるドローンの利用について、正しいものを1つ選びなさい。", "options": ["アマチュア無線資格があれば、業務利用を含めどのような目的でも自由に使用できる。", "アマチュア無線の周波数を用いた映像伝送は、営利目的（業務）には使用できない。", "アマチュア無線は無資格でも運用できる。"], "answer": 2, "explanation": "アマチュア無線は金銭上の利益のための（業務）通信には使用できず、利用には無線従事者資格と無線局免許が必要である。"}, {"id": 67, "chapter": "規則", "stem": "小型無人機等飛行禁止法の対象施設について、誤っているものを1つ選びなさい。", "options": ["国会議事堂、内閣総理大臣官邸などの国の重要な施設が対象となる。", "規制されるのは対象施設の敷地内のみで、その周辺地域は規制の対象外である。", "原子力事業所や対象となる外国公館等もその周辺地域が対象となる。"], "answer": 2, "explanation": "この法律では、対象施設の敷地内だけでなく、その周辺おおむね300mの地域の上空（レッドゾーン）における飛行も規制の対象となる。"}, {"id": 68, "chapter": "規則", "stem": "緊急用務空域について、正しいものを1つ選びなさい。", "options": ["災害時等に消防・救助・警察等の緊急用務を行う航空機の飛行が想定される空域として指定されることがある。", "緊急用務空域は常設の空域で、内容が変更されることはない。", "緊急用務空域であっても、無人航空機は自由に飛行してよい。"], "answer": 1, "explanation": "緊急用務空域は、災害対応等で航空機の緊急用務飛行が想定される場合に指定され、原則として無人航空機の飛行は禁止される。指定状況は随時変わるため飛行前に確認する。"}, {"id": 69, "chapter": "規則", "stem": "航空機と無人航空機の関係（衝突の予防）について、誤っているものを1つ選びなさい。", "options": ["無人航空機の飛行が優先されるため、航空機が回避すべきである。", "航空機の飛行と進路が交差・接近するおそれがある場合、無人航空機側が飛行を控える。", "有人の航空機の航行の安全を確保することが優先される。"], "answer": 1, "explanation": "空域では有人航空機の安全が優先され、進路が交差・接近するおそれがある場合は無人航空機側が飛行を控える。"}, {"id": 70, "chapter": "規則", "stem": "捜索又は救助のための特例について、正しいものを1つ選びなさい。", "options": ["個人であれば誰でも、災害時には許可なくあらゆる飛行ができる。", "捜索・救助のための飛行であっても、平時と全く同じ手続きが必要である。", "国や地方公共団体、これらの依頼を受けた者が捜索・救助等を行う場合、特定飛行の許可・承認等の規定が一部適用されないことがある。"], "answer": 3, "explanation": "事故・災害時に国や地方公共団体（又はその依頼を受けた者）が捜索・救助等の緊急性の高い業務を行う場合には、特定飛行に関する規定の一部が適用されない特例がある。"}, {"id": 71, "chapter": "システム", "stem": "無人航空機のモーターについて、誤っているものを1つ選びなさい。", "options": ["一般的なマルチローターには、ブラシレスDCモーターが多く用いられる。", "モーターの回転数はESCによって制御される。", "ブラシレスモーターはブラシの摩耗が大きく、頻繁なブラシ交換が必要である。"], "answer": 3, "explanation": "ブラシレスモーターはブラシをもたないため摩耗が少なく、耐久性に優れる。ブラシ交換が必要なのはブラシ付きモーターである。"}, {"id": 72, "chapter": "システム", "stem": "プロペラ（ローター）について、正しいものを1つ選びなさい。", "options": ["プロペラは損傷していても回転していれば性能に影響しない。", "プロペラの回転方向はすべて同一でなければならない。", "プロペラの破損や変形は、振動や推力低下、墜落の原因となるため点検・交換が必要である。"], "answer": 3, "explanation": "プロペラの破損・変形は振動や推力低下を招き墜落につながるため、点検・交換が重要である。マルチローターでは隣り合うプロペラの回転方向は逆になる。"}, {"id": 73, "chapter": "システム", "stem": "マルチローターの姿勢制御（3軸）について、誤っているものを1つ選びなさい。", "options": ["ロールとは、機体を上下に平行移動させる動きのことである。", "機首方向を回転させる動きをヨーという。", "機体を前後に傾ける動きをピッチという。"], "answer": 1, "explanation": "ロールは機体を左右に傾ける動きである。上下方向の移動はスロットル（上昇・下降）によるもので、3軸の回転運動はヨー・ピッチ・ロールを指す。"}, {"id": 74, "chapter": "システム", "stem": "機体に搭載されるセンサについて、正しいものを1つ選びなさい。", "options": ["加速度センサは機体の位置を直接測定するためのものである。", "気圧センサは、気圧の変化から高度を推定するために用いられる。", "ジャイロセンサは機体の温度を計測する。"], "answer": 2, "explanation": "気圧センサは気圧の変化から高度を推定する。加速度センサは加速度、ジャイロセンサは角速度を計測し、これらを統合して姿勢を制御する。"}, {"id": 75, "chapter": "システム", "stem": "送信機の操作モードについて、誤っているものを1つ選びなさい。", "options": ["送信機にはモード1やモード2などのスティック配置の違いがある。", "操作モードが異なると、同じスティック操作でも機体の挙動が異なる。", "操作モードは機体側で自動判別されるため、操縦者が把握する必要はない。"], "answer": 3, "explanation": "操作モードによりスティックに割り当てられた操作が異なるため、操縦者は使用する送信機のモードを正しく把握しておく必要がある。"}, {"id": 76, "chapter": "システム", "stem": "リチウムポリマー（LiPo）バッテリーのセルについて、正しいものを1つ選びなさい。", "options": ["セルを直列に接続すると電圧が高くなる。", "セル1個あたりの電圧は何ボルトでも問題なく、過放電に注意する必要はない。", "すべてのセルは常に均等に劣化するため、セルバランスを管理する必要はない。"], "answer": 1, "explanation": "セルを直列接続すると電圧が高くなる。LiPoはセルあたりの電圧管理（過充電・過放電の防止、セルバランス）が安全上重要である。"}, {"id": 77, "chapter": "システム", "stem": "エンジン（内燃機関）を動力源とする機体について、誤っているものを1つ選びなさい。", "options": ["燃料の漏れや残量、点火系統などの点検が必要である。", "エンジン機はバッテリーを一切搭載しないため、電気系統の点検は不要である。", "エンジン機は電動機に比べ整備・点検の項目が多くなる傾向がある。"], "answer": 2, "explanation": "エンジン機でも制御系や始動系などに電気系統を備えるのが一般的であり、電気系統の点検は必要である。"}, {"id": 78, "chapter": "システム", "stem": "電波の特性について、正しいものを1つ選びなさい。", "options": ["周波数が高いほど障害物を回り込みやすく、遮蔽物の影響を受けない。", "周波数が高い電波ほど直進性が強く、障害物の影響を受けやすい。", "電波は金属やコンクリート等の遮蔽物の影響を全く受けない。"], "answer": 2, "explanation": "一般に周波数が高い電波ほど直進性が強く、建物等の障害物の影響（遮蔽・反射）を受けやすい。金属やコンクリートは電波を遮蔽・反射する。"}, {"id": 79, "chapter": "システム", "stem": "磁気方位センサ（コンパス）のキャリブレーションについて、誤っているものを1つ選びなさい。", "options": ["一度実施すれば、その後はどんな環境でも再実施は不要である。", "飛行場所を大きく移動したときなどに実施することが望ましい。", "鉄筋や磁石、強い電流の近くを避けて実施する。"], "answer": 1, "explanation": "コンパスのキャリブレーションは、飛行場所の変更時や方位異常が疑われるときなどに、磁気の影響の少ない場所で実施することが望ましい。"}, {"id": 80, "chapter": "システム", "stem": "GNSSによる測位について、正しいものを1つ選びなさい。", "options": ["受信できる衛星の数が少ないほど測位精度は高くなる。", "建物に反射した電波（マルチパス）は測位精度を向上させる。", "RTK等の技術を用いると、より高精度な測位が可能となる。"], "answer": 3, "explanation": "RTK等の補正技術により高精度な測位が可能となる。受信衛星数が多いほど精度が安定し、マルチパスは測位誤差の原因となる。"}, {"id": 81, "chapter": "システム", "stem": "物件投下のために装備される機器について、誤っているものを1つ選びなさい。", "options": ["投下機構の作動確認やロック状態の点検が必要である。", "物件投下は法令上の制約がないため、いつでも自由に行ってよい。", "投下時は機体重量や重心が変化するため、機体姿勢への影響に注意する。"], "answer": 2, "explanation": "無人航空機からの物件投下は特定飛行に該当し、原則として承認が必要である。投下に伴う重量・重心変化への注意も求められる。"}, {"id": 82, "chapter": "システム", "stem": "電動機の整備・点検・保管について、正しいものを1つ選びなさい。", "options": ["バッテリーは水濡れや高温・直射日光下での保管が望ましい。", "機体やバッテリーの取扱説明書に従い、定期的な点検・整備を行う。", "異音や異臭、発熱があっても、飛行できれば整備の必要はない。"], "answer": 2, "explanation": "取扱説明書に従った定期的な点検・整備が基本である。バッテリーは高温・直射日光・水濡れを避けて保管し、異音・異臭・発熱は故障の兆候として点検・整備が必要である。"}, {"id": 83, "chapter": "操縦者・運航体制", "stem": "飛行前の外部点検と作動点検について、誤っているものを1つ選びなさい。", "options": ["外部点検では、機体やプロペラ、配線の破損・緩み等を目視等で確認する。", "外部点検で異常がなければ、作動点検は省略してよい。", "作動点検では、各舵面やモーターの作動、通信の状態等を確認する。"], "answer": 2, "explanation": "外部点検と作動点検はそれぞれ確認する内容が異なり、いずれも飛行前に実施すべきものである。"}, {"id": 84, "chapter": "操縦者・運航体制", "stem": "情報セキュリティ（セキュリティ対策）について、正しいものを1つ選びなさい。", "options": ["撮影した映像や飛行データは管理する必要がなく、自由に扱ってよい。", "機体やシステムのソフトウェアを最新の状態に保ち、不正アクセスへの対策を行う。", "通信の乗っ取り（ハッキング）の懸念はないため、対策は不要である。"], "answer": 2, "explanation": "ソフトウェアの更新や認証管理など不正アクセス・乗っ取りへの対策、撮影データやプライバシーの適切な管理など、情報セキュリティへの配慮が求められる。"}, {"id": 85, "chapter": "操縦者・運航体制", "stem": "離着陸時の地面効果について、正しいものを1つ選びなさい。", "options": ["地面効果は高度が高いほど大きくなる。", "地面効果は着陸時にのみ生じ、離陸時には生じない。", "地面に近い高度では、気流の影響により浮揚力が変化することがある。"], "answer": 3, "explanation": "地面付近では地面効果や吹き返しの気流により機体の挙動が変化することがある。地面効果は地面に近いほど影響が大きく、離着陸の双方で生じ得る。"}, {"id": 86, "chapter": "操縦者・運航体制", "stem": "GPSが受信できない状況での操縦について、誤っているものを1つ選びなさい。", "options": ["GPSが受信できなくなっても、機体は必ずその場で安定してホバリングを続ける。", "GPSが受信できない場合、機体が位置を保持できず流される（ドリフトする）ことがある。", "このような状況に備え、GPSに頼らない手動操縦（姿勢制御モード等）の技量を身につけておく。"], "answer": 1, "explanation": "GPSが受信できなくなると位置保持ができず機体が流されることがあるため、姿勢制御モード等での手動操縦の習熟が重要である。"}, {"id": 87, "chapter": "操縦者・運航体制", "stem": "自動帰還（RTH／ゴーホーム）機能について、正しいものを1つ選びなさい。", "options": ["RTHの帰還経路上に障害物がある場合、衝突するおそれがあるため事前確認が重要である。", "RTHが作動すれば、いかなる状況でも安全に発進地点へ戻れる。", "ホームポイントの設定が誤っていても、機体は正しい場所へ帰還する。"], "answer": 1, "explanation": "RTHは設定されたホームポイントへ戻る機能だが、帰還高度や経路上の障害物、ホームポイントの設定誤りにより危険が生じ得るため、事前確認が重要である。"}, {"id": 88, "chapter": "操縦者・運航体制", "stem": "操縦者の身体的・精神的状態とパフォーマンスについて、誤っているものを1つ選びなさい。", "options": ["視力や反応速度の低下は、操縦の安全に影響を及ぼし得る。", "強いストレスや焦りは、判断の誤りを招きやすい。", "体調や精神状態は技量と無関係であり、安全に影響しない。"], "answer": 3, "explanation": "視力・反応速度の低下、疲労、ストレスや焦りなどはいずれも判断・操作に影響し、安全運航に関わる重要な要素である。"}, {"id": 89, "chapter": "操縦者・運航体制", "stem": "TEM（脅威とエラーの管理）の考え方について、正しいものを1つ選びなさい。", "options": ["エラーは必ず防げるものなので、事後の対応は考えなくてよい。", "運航に潜む脅威（threat）やエラーを予測し、管理して安全を確保しようとする考え方である。", "TEMは個人の技量とは無関係で、組織だけが取り組むものである。"], "answer": 2, "explanation": "TEMは運航に内在する脅威やヒューマンエラーを予測・回避・管理し、影響を最小化して安全を確保しようとする考え方である。"}, {"id": 90, "chapter": "操縦者・運航体制", "stem": "補助者との連携について、誤っているものを1つ選びなさい。", "options": ["飛行前に、操縦者と補助者の役割分担や連絡手順を確認しておく。", "補助者は、第三者の接近や気象の変化など気づいた事項を操縦者に伝える。", "飛行中は集中を妨げないよう、補助者は操縦者に一切声をかけてはならない。"], "answer": 3, "explanation": "補助者は危険の接近や状況変化を操縦者へ適時伝えることが役割であり、事前に取り決めた連絡手順に従って必要な情報共有を行う。"}, {"id": 91, "chapter": "操縦者・運航体制", "stem": "飛行記録（飛行日誌の飛行記録）について、正しいものを1つ選びなさい。", "options": ["飛行年月日、飛行時間、飛行の概要、不具合の有無などを記録する。", "飛行記録は操縦者の記憶に頼ればよく、書面等に残す必要はない。", "不具合が発生しても、飛行記録に残す必要はない。"], "answer": 1, "explanation": "飛行記録には飛行日時・経路・時間・概要や、機体の不具合・対応等を記録する。これらは後の安全管理や原因究明に役立つ。"}, {"id": 92, "chapter": "リスク管理", "stem": "飛行経路の設定について、誤っているものを1つ選びなさい。", "options": ["第三者や建物、交通量の多い道路の上空をできるだけ避ける経路を検討する。", "経路は一度決めれば、当日の状況に変化があっても変更すべきではない。", "不時着が可能な場所や緊急着陸地点を経路上に想定しておく。"], "answer": 2, "explanation": "経路は当日の気象や周囲の状況の変化に応じて柔軟に見直すべきであり、固定して変更しない方針は適切でない。"}, {"id": 93, "chapter": "リスク管理", "stem": "リスクアセスメント（リスク評価）の進め方について、正しいものを1つ選びなさい。", "options": ["リスクの大きさは考慮せず、すべてのリスクに同じ対策を一律に講じる。", "リスク評価は飛行後に行うものである。", "ハザードを洗い出し、その被害の重大性と発生可能性からリスクの大きさを見積もる。"], "answer": 3, "explanation": "リスクアセスメントはハザードの特定→リスクの見積り（重大性×発生可能性）→低減策の検討という流れで、飛行前に行う。リスクの大きさに応じて対策の優先度を判断する。"}, {"id": 94, "chapter": "リスク管理", "stem": "リスク低減策の考え方について、誤っているものを1つ選びなさい。", "options": ["まず危険源そのものを除去・回避できないかを検討する。", "低減策を講じればリスクは完全にゼロになるため、残留リスクへの備えは不要である。", "除去できないリスクは、立入管理措置や補助者配置等で低減を図る。"], "answer": 2, "explanation": "低減策を講じてもリスクをゼロにはできないため、残留リスクを認識し、緊急時の対応を準備しておくことが重要である。"}, {"id": 95, "chapter": "リスク管理", "stem": "気象情報の収集源について、正しいものを1つ選びなさい。", "options": ["飛行地点の気象は天気予報だけを見ればよく、現地での観察は不要である。", "風速の情報は飛行に関係しないため、収集する必要はない。", "気象庁の発表する天気予報やアメダス、各種気象情報サービス等を活用する。"], "answer": 3, "explanation": "気象庁の予報やアメダス、各種気象サービス等を活用しつつ、現地での実際の風や雲の観察も併せて行う。風速・風向は飛行可否の重要な判断材料である。"}, {"id": 96, "chapter": "リスク管理", "stem": "雷や積乱雲に関するリスクについて、誤っているものを1つ選びなさい。", "options": ["積乱雲の接近は、急な強風や落雷、降ひょう等を伴うことがあり危険である。", "積乱雲が遠くに見えても、急発達することはないので飛行を続けてよい。", "雷の発生が予想される場合は、飛行を中止・延期する判断が求められる。"], "answer": 2, "explanation": "積乱雲は短時間で急発達し、突風・落雷・激しい降雨を伴うことがあるため、接近や発達の兆候があれば早めに飛行を中止する。"}, {"id": 97, "chapter": "リスク管理", "stem": "突風やダウンバースト（吹き下ろし）について、正しいものを1つ選びなさい。", "options": ["突発的な強い風は機体のバランスを崩し、墜落の原因となることがある。", "突風は予測できるため、飛行中に警戒する必要はない。", "吹き下ろしの気流は上昇方向の力なので、機体を持ち上げ安全である。"], "answer": 1, "explanation": "突風や下降気流（ダウンバースト）は機体の姿勢を急変させ墜落の原因となる。予測が難しいため、気象の変化に常に警戒する必要がある。"}, {"id": 98, "chapter": "リスク管理", "stem": "視程・霧などの視環境について、誤っているものを1つ選びなさい。", "options": ["霧や靄により視程が悪化すると、目視による機体の確認が困難になる。", "視程が悪い状況では、機体の見失いや距離感の誤りが生じやすい。", "視程が悪くても、目視内飛行であれば安全上の問題は生じない。"], "answer": 3, "explanation": "視程の悪化は目視内飛行であっても機体の見失いや距離・姿勢の把握の誤りを招き、安全上のリスクとなる。"}, {"id": 99, "chapter": "リスク管理", "stem": "大型機（最大離陸重量25kg以上）の運航リスクについて、正しいものを1つ選びなさい。", "options": ["大型機は重いため安定しており、小型機よりリスクは小さい。", "大型機は墜落時の被害が大きくなりやすく、より慎重なリスク管理が求められる。", "機体が大型でも、点検・整備の内容は小型機と全く変わらない。"], "answer": 2, "explanation": "大型機は運動エネルギーが大きく、墜落時の被害（人的・物的）が大きくなりやすいため、より慎重な点検・整備とリスク管理が必要となる。"}, {"id": 100, "chapter": "リスク管理", "stem": "夜間飛行のリスクについて、誤っているものを1つ選びなさい。", "options": ["夜間は人や障害物が見えにくいが、視認性の低下はリスクにはならない。", "暗所では機体の姿勢・方向・距離を把握しにくく、錯覚を起こしやすい。", "機体の灯火や周囲の照明状況を確認し、安全を確保する。"], "answer": 1, "explanation": "夜間は機体・障害物・第三者の視認性が低下し、距離感や姿勢の錯覚も生じやすいため、灯火の活用や十分な事前確認などのリスク管理が重要である。"}, {"id": 101, "chapter": "規則", "stem": "航空機と無人航空機の区分について、正しいものを1つ選びなさい。", "options": ["無操縦者航空機は重量が軽ければ無人航空機に分類される。", "構造上人が乗れる機体でも、無人で飛ばせばすべて無人航空機である。", "人が乗ることのできる構造の機体を無人で飛行させる「無操縦者航空機」は、航空機として扱われる。"], "answer": 3, "explanation": "無操縦者航空機は構造上人が乗れる航空機を無人で飛行させるもので、航空機として扱われ、無人航空機には該当しない。"}, {"id": 102, "chapter": "規則", "stem": "無人航空機の登録手続きについて、誤っているものを1つ選びなさい。", "options": ["所有者の本人確認は不要で、匿名でも登録できる。", "登録には所有者・使用者の情報や機体の情報の届出が必要である。", "オンライン（ドローン情報基盤システム）で登録の申請ができる。"], "answer": 1, "explanation": "登録の目的の一つは所有者の把握であり、申請時には所有者の本人確認が行われる。匿名での登録はできない。"}, {"id": 103, "chapter": "規則", "stem": "登録の更新・抹消について、正しいものを1つ選びなさい。", "options": ["登録を継続するには、有効期間満了前に更新の手続きを行う必要がある。", "機体を廃棄しても、抹消の届出は不要である。", "一度登録すれば、所有者が変わっても届出は不要である。"], "answer": 1, "explanation": "登録の有効期間（3年）満了前には更新が必要である。機体の廃棄や所有者の変更等があった場合は、抹消や変更の届出が必要となる。"}, {"id": 104, "chapter": "規則", "stem": "リモートIDが発信する情報について、誤っているものを1つ選びなさい。", "options": ["登録記号や製造番号といった機体の識別情報を含む。", "機体の位置や時刻等の情報を含む。", "操縦者の住所・氏名などの個人情報がそのまま外部に発信される。"], "answer": 3, "explanation": "リモートIDが発信するのは登録記号・製造番号等の識別情報や位置・速度・時刻等であり、操縦者個人の住所・氏名がそのまま発信されるものではない。"}, {"id": 105, "chapter": "規則", "stem": "人口集中地区（DID）について、正しいものを1つ選びなさい。", "options": ["DIDは飛行する者が任意に設定できる区域である。", "DIDは国勢調査の結果に基づいて設定される人口が集中している地区である。", "DIDの上空であっても、飛行に特段の制限はない。"], "answer": 2, "explanation": "DID（人口集中地区）は国勢調査に基づき設定される。その上空での飛行は特定飛行に該当し、原則として許可が必要である。"}, {"id": 106, "chapter": "規則", "stem": "夜間飛行の定義について、誤っているものを1つ選びなさい。", "options": ["夜間とは、原則として日没後から翌日の日出までの時間帯をいう。", "夜間とは時計上の午後6時から午前6時までと法令で固定的に定められている。", "夜間飛行は特定飛行に該当する。"], "answer": 2, "explanation": "夜間は日没後から日出までで、日付や地域により時刻が変動する。固定的な時計時刻で定められているわけではない。"}, {"id": 107, "chapter": "規則", "stem": "目視外飛行について、正しいものを1つ選びなさい。", "options": ["双眼鏡を用いて機体を見れば目視内飛行に該当する。", "補助者の有無にかかわらず、操縦者が機体を直接目視できない状態での飛行は目視外飛行である。", "モニター画面を見ながらの飛行も、画面で確認できれば目視内飛行である。"], "answer": 2, "explanation": "目視外飛行は操縦者が自分の目で機体を直接見ない状態での飛行をいう。双眼鏡やモニター越しの確認は「目視」に含まれず、目視外飛行に該当する。"}, {"id": 108, "chapter": "規則", "stem": "人又は物件との距離（30m）の対象について、誤っているものを1つ選びなさい。", "options": ["ここでいう人・物件は、飛行に関係しない第三者やその物件をいう。", "自分が管理する物件であっても、すべて30mの確保が義務付けられる。", "操縦者や補助者など飛行の関係者は、距離の対象に含まれない。"], "answer": 2, "explanation": "30mの距離は第三者やその物件との間で確保が求められるものであり、操縦者・補助者や自らの管理下にある物件は対象に含まれない。"}, {"id": 109, "chapter": "規則", "stem": "特定飛行に係る「許可」と「承認」について、正しいものを1つ選びなさい。", "options": ["「許可」と「承認」は同じ意味であり、両者に区別はない。", "飛行する空域に関するものを「承認」、飛行の方法に関するものを「許可」という。", "飛行する空域に関する規制は「許可」、飛行の方法に関する規制は「承認」を要する。"], "answer": 3, "explanation": "飛行する空域に関する規制（空港周辺・DID・150m以上等）には「許可」、飛行の方法に関する規制（夜間・目視外・30m接近等）には「承認」が必要となる。"}, {"id": 110, "chapter": "規則", "stem": "機体認証の有効期間について、誤っているものを1つ選びなさい。", "options": ["第一種機体認証の有効期間は1年である。", "第二種機体認証の有効期間は3年である。", "機体認証には有効期間がなく、再検査は不要である。"], "answer": 3, "explanation": "機体認証には有効期間があり、第一種は1年、第二種は3年で、継続使用には更新（再度の検査）が必要となる。"}, {"id": 111, "chapter": "規則", "stem": "技能証明に対する行政処分について、正しいものを1つ選びなさい。", "options": ["技能証明は一度交付されると、いかなる理由でも取り消されることはない。", "行政処分は学科試験の不合格に対してのみ行われる。", "航空法違反等があった場合、技能証明の取消しや効力停止の対象となり得る。"], "answer": 3, "explanation": "航空法令への違反等があった場合、技能証明の取消しや一定期間の効力停止といった行政処分の対象となり得る。"}, {"id": 112, "chapter": "規則", "stem": "飛行日誌の点検整備記録について、誤っているものを1つ選びなさい。", "options": ["点検・整備を実施した年月日や内容、実施者を記録する。", "点検整備記録は、不具合が一度もなければ作成しなくてよい。", "不具合とその是正内容についても記録する。"], "answer": 2, "explanation": "点検整備記録は実施した点検・整備の内容を記録するもので、不具合の有無にかかわらず作成・保存する必要がある。"}, {"id": 113, "chapter": "規則", "stem": "重大インシデント（事故に至るおそれのあった事態）について、正しいものを1つ選びなさい。", "options": ["航空機との衝突のおそれがあったと認められる接近は、重大インシデントに該当し得る。", "機体が地面に接触しただけの軽微なものは、すべて報告対象である。", "重大インシデントは、人が死亡した場合のみを指す。"], "answer": 1, "explanation": "航空機との接近（衝突のおそれ）や機体の制御不能・行方不明など、事故に至るおそれのあった事態が重大インシデントに該当し、報告の対象となる。"}, {"id": 114, "chapter": "規則", "stem": "小型無人機等飛行禁止法に基づく手続きについて、誤っているものを1つ選びなさい。", "options": ["手続きはすべて国土交通大臣に対して行う。", "対象施設周辺で飛行させる場合、所在地を管轄する都道府県公安委員会等への事前通報が必要となる。", "対象施設の管理者等の同意を得ることが必要である。"], "answer": 1, "explanation": "小型無人機等飛行禁止法に基づく通報先は都道府県公安委員会等であり、航空法の許可・承認（国土交通大臣）とは手続きが異なる。"}, {"id": 115, "chapter": "規則", "stem": "無線機器の技術基準適合証明（技適）について、正しいものを1つ選びなさい。", "options": ["技適マークがなくても、海外製であれば国内で自由に使用できる。", "技適は機体登録と同じ手続きである。", "技適を受けた機器には技適マークが付されている。"], "answer": 3, "explanation": "技術基準適合証明を受けた無線機器には技適マークが付される。技適のない無線機器の使用は電波法違反となるおそれがあり、機体登録とは別の制度である。"}, {"id": 116, "chapter": "規則", "stem": "航空法以外に関係し得る法令等について、誤っているものを1つ選びなさい。", "options": ["撮影によって他人の容ぼう等を写し込む場合、プライバシーや肖像権に配慮が必要となる。", "道路上空での飛行や離着陸では、道路交通法等が関係する場合がある。", "航空法さえ守れば、他の法令や条例は一切考慮しなくてよい。"], "answer": 3, "explanation": "無人航空機の運用では、航空法のほか電波法、民法、個人情報・プライバシー、道路交通法、各地方公共団体の条例など多くの法令等に配慮する必要がある。"}, {"id": 117, "chapter": "規則", "stem": "飛行自粛要請への対応について、正しいものを1つ選びなさい。", "options": ["自粛要請は強制力がないため、無視して飛行してよい。", "自粛要請空域は航空法の特定飛行と同じものである。", "大規模イベントや災害対応等で飛行の自粛が要請された場合は、要請に応じて飛行を控える。"], "answer": 3, "explanation": "飛行自粛要請空域では、関係機関からの要請に応じて飛行を控えることが求められる。特定飛行とは別の枠組みである。"}, {"id": 118, "chapter": "規則", "stem": "立入管理措置の具体的方法について、誤っているものを1つ選びなさい。", "options": ["飛行範囲の周囲を柵やコーン、ロープ等で区画する。", "第三者が立ち入っても、飛行範囲が広ければ問題ないため特に対策は不要である。", "立入りを制限する旨の看板を掲示したり、補助者を配置したりする。"], "answer": 2, "explanation": "立入管理措置は第三者の立入りを物理的・人的に制限する措置であり、看板や区画、補助者配置等により第三者の進入を防ぐことが必要である。"}, {"id": 119, "chapter": "規則", "stem": "飛行前のアルコールに関する確認について、正しいものを1つ選びなさい。", "options": ["少量の飲酒であれば、確認や記録は一切不要である。", "飲酒の有無やアルコールの影響の確認を行い、必要に応じて記録する。", "アルコールの確認は搭乗者がいる場合のみ必要である。"], "answer": 2, "explanation": "アルコール等の影響下での飛行は禁止されており、飛行前にその影響の有無を確認し記録しておくことが、安全管理上望ましい。"}, {"id": 120, "chapter": "規則", "stem": "飛行の許可・承認を受けるための要件について、誤っているものを1つ選びなさい。", "options": ["申請書を提出しさえすれば、内容にかかわらず必ず許可される。", "機体が安全基準に適合し、操縦者が必要な知識・能力を有することが求められる。", "安全を確保するための体制（補助者配置や緊急時の対応等）が整っていることが求められる。"], "answer": 1, "explanation": "許可・承認は、機体の安全性、操縦者の能力、安全確保の体制等が審査され、基準を満たさなければ認められない。申請すれば必ず許可されるものではない。"}, {"id": 121, "chapter": "システム", "stem": "無人航空機の機体の種類について、正しいものを1つ選びなさい。", "options": ["固定翼機は垂直に離着陸できるのが一般的である。", "垂直離着陸と固定翼飛行の双方が可能なVTOL型（複合型）の機体もある。", "マルチローターは滑走路がなければ離着陸できない。"], "answer": 2, "explanation": "VTOL（垂直離着陸）型は、回転翼による垂直離着陸と固定翼による効率的な水平飛行を両立する複合型機体である。マルチローターは垂直離着陸が可能で滑走路を要しない。"}, {"id": 122, "chapter": "システム", "stem": "揚力の発生について、誤っているものを1つ選びなさい。", "options": ["翼やローターは、気流との角度（迎角）に応じて揚力を発生する。", "迎角は大きいほど常に揚力が増え続け、失速は起こらない。", "迎角を大きくしすぎると、ある角度を超えて揚力が急減する失速が起こり得る。"], "answer": 2, "explanation": "迎角を大きくすると揚力は増すが、ある臨界角（失速角）を超えると気流が剥離して揚力が急減する（失速）。迎角が大きいほど揚力が増え続けるわけではない。"}, {"id": 123, "chapter": "システム", "stem": "フェールセーフ機能の設定について、正しいものを1つ選びなさい。", "options": ["通信途絶時の挙動（ホバリング・帰還・着陸等）を事前に設定・確認しておく。", "フェールセーフは初期設定のままでよく、内容を把握する必要はない。", "フェールセーフが設定されていれば、いかなる異常でも必ず安全に着陸する。"], "answer": 1, "explanation": "通信途絶（フェールセーフ）時の挙動は設定可能であり、機種や設定により異なるため、事前に内容を把握・確認しておくことが重要である。"}, {"id": 124, "chapter": "システム", "stem": "送信機と機体の通信（バインド）について、誤っているものを1つ選びなさい。", "options": ["送信機と受信機は、あらかじめ対応付け（バインド）して通信を確立する。", "一度バインドすれば、他の機体の送信機からの混信は一切起こらない。", "飛行前に通信が正常に確立しているかを確認する。"], "answer": 2, "explanation": "同一周波数帯を用いる他の無線機器との混信・干渉は起こり得るため、周囲の電波環境の確認が必要である。バインドにより特定の送信機・受信機を対応付けるが、混信が完全になくなるわけではない。"}, {"id": 125, "chapter": "システム", "stem": "リチウム系バッテリーの充電について、正しいものを1つ選びなさい。", "options": ["充電は無人で放置し、満充電後も長時間つないだままにしておくのが望ましい。", "膨張・損傷したバッテリーでも、充電すれば再び使用できる。", "専用の充電器を用い、セルのバランスをとりながら適切に充電する。"], "answer": 3, "explanation": "リチウム系バッテリーは専用充電器でバランス充電を行う。充電中の放置や過充電は発火の危険があり、膨張・損傷したバッテリーは使用せず適切に処分する。"}, {"id": 126, "chapter": "システム", "stem": "プロペラの取り付けについて、誤っているものを1つ選びなさい。", "options": ["回転方向（CW／CCW）に応じた正しいプロペラを、対応する位置に取り付ける。", "回転方向は機体の挙動に影響しないため、左右を入れ替えても問題ない。", "取り付け後、緩みやがたつきがないかを確認する。"], "answer": 2, "explanation": "マルチローターは隣り合うプロペラを逆回転させて反トルクを相殺するため、回転方向に応じた正しいプロペラを正しい位置に取り付ける必要がある。"}, {"id": 127, "chapter": "システム", "stem": "磁気方位と地磁気について、正しいものを1つ選びなさい。", "options": ["磁気偏差は世界中どこでも同じ値である。", "地図上の北（真北）と方位磁石が指す北（磁北）にはずれ（磁気偏差）がある。", "地磁気センサは周囲の鉄や電流の影響を受けない。"], "answer": 2, "explanation": "真北と磁北の間には磁気偏差（偏角）があり、場所によって値が異なる。地磁気センサは周囲の磁性体や電流の影響を受けやすい。"}, {"id": 128, "chapter": "システム", "stem": "気圧高度計の特性について、誤っているものを1つ選びなさい。", "options": ["気圧の変化から高度を推定するため、気象の変化により誤差が生じ得る。", "気圧高度計は気象に左右されず、常に正確な対地高度を示す。", "飛行中に気圧が変化すると、表示高度に誤差が生じることがある。"], "answer": 2, "explanation": "気圧高度計は気圧から高度を推定するため、気圧（気象）の変化により誤差が生じる。常に正確な対地高度を示すものではない。"}, {"id": 129, "chapter": "システム", "stem": "GNSSを構成する測位衛星について、正しいものを1つ選びなさい。", "options": ["GPSのほか、日本の準天頂衛星「みちびき」など複数の衛星システムを利用できる。", "利用できる衛星はアメリカのGPSのみに限られる。", "衛星の数は測位精度に影響しない。"], "answer": 1, "explanation": "GNSSはGPS（米国）に加え、GLONASS、Galileo、みちびき（QZSS）等の複数システムを利用できる。受信できる衛星数が多いほど測位は安定しやすい。"}, {"id": 130, "chapter": "システム", "stem": "送信機の電波の到達について、誤っているものを1つ選びなさい。", "options": ["送信機と機体の間に障害物があると、通信が不安定になることがある。", "電波は障害物の影響を受けないため、機体が建物の陰に入っても通信は安定する。", "見通しのよい環境ほど、安定した通信を確保しやすい。"], "answer": 2, "explanation": "電波は建物や地形等の障害物により遮蔽・反射され、機体が陰に入ると通信が不安定になる。見通しのよい運用が望ましい。"}, {"id": 131, "chapter": "システム", "stem": "ジンバルやカメラ等の搭載機器について、正しいものを1つ選びなさい。", "options": ["ジンバルやカメラを搭載しても、機体の重量や重心には影響しない。", "ジンバルは、機体の揺れを抑えてカメラを安定させる装置である。", "搭載機器は飛行性能と無関係なので、点検の対象とならない。"], "answer": 2, "explanation": "ジンバルは機体の振動・揺れを補正しカメラを安定させる装置である。搭載機器は重量・重心に影響し、ケーブルや固定状態の点検も必要である。"}, {"id": 132, "chapter": "システム", "stem": "機体又はバッテリーの故障の影響について、誤っているものを1つ選びなさい。", "options": ["一部の部品が故障しても、機体は必ず安全に飛行を継続できる。", "モーターやESCの不具合は、推力の喪失や機体の不安定化につながる。", "バッテリーの異常な発熱や電圧低下は、墜落の原因となり得る。"], "answer": 1, "explanation": "モーター・ESC・バッテリー等の故障は推力喪失や姿勢崩れ、墜落の原因となり得る。一部の故障で常に安全に飛行を継続できるわけではない。"}, {"id": 133, "chapter": "操縦者・運航体制", "stem": "飛行前の打合せ（ブリーフィング）について、正しいものを1つ選びなさい。", "options": ["打合せは飛行後に行えばよい。", "操縦者と補助者で、飛行計画・役割分担・緊急時の対応等を事前に共有する。", "操縦者一人が把握していれば、関係者との共有は不要である。"], "answer": 2, "explanation": "飛行前のブリーフィングで飛行計画・役割分担・連絡手順・緊急時対応等を関係者間で共有しておくことが、安全な運航につながる。"}, {"id": 134, "chapter": "操縦者・運航体制", "stem": "無人航空機に関する保険の補償対象について、誤っているものを1つ選びなさい。", "options": ["賠償責任保険は、第三者に与えた対人・対物の損害の賠償に備える保険である。", "賠償責任保険に加入していれば、墜落で自機が壊れた場合の修理費も補償される。", "機体保険は、自機の損壊や紛失に備える保険である。"], "answer": 2, "explanation": "賠償責任保険は第三者への損害賠償に備えるもので、自機の損壊は対象外である。自機の損壊・紛失には機体保険で備えるものであり、両者は補償の対象が異なる。"}, {"id": 135, "chapter": "操縦者・運航体制", "stem": "着陸時の操作について、正しいものを1つ選びなさい。", "options": ["着陸は一気に高速で降下させるのが安全である。", "着陸時に風の影響を受けることはない。", "着陸直前は地面付近の気流（吹き返し）の影響を受けやすいため、慎重に操作する。"], "answer": 3, "explanation": "着陸時は地面付近の気流の乱れや吹き返し、風の影響を受けやすいため、急降下を避け慎重に降下・接地させる。"}, {"id": 136, "chapter": "操縦者・運航体制", "stem": "手動操縦の習熟について、誤っているものを1つ選びなさい。", "options": ["自動操縦に頼れない状況に備え、基本的な手動操縦を反復練習しておく。", "緊急時に手動へ切り替えて安全に着陸させる技量が求められる。", "自動操縦機能があれば、手動操縦の練習は不要である。"], "answer": 3, "explanation": "GPSロストや自動操縦の不具合等に備え、手動操縦（姿勢制御モード等）の技量を維持しておくことが安全上重要である。"}, {"id": 137, "chapter": "操縦者・運航体制", "stem": "通信途絶やGPSロスト時の対応について、正しいものを1つ選びなさい。", "options": ["あらかじめ機体の挙動（フェールセーフ）を把握し、落ち着いて対応できるよう備える。", "異常が起きたら、まず周囲の人に知らせず黙って様子を見る。", "通信が回復するまで何もせず待てば、必ず安全に着陸する。"], "answer": 1, "explanation": "通信途絶やGPSロスト時の機体挙動を事前に把握し、補助者と連携して周囲の安全を確保しつつ落ち着いて対応できるよう備えることが重要である。"}, {"id": 138, "chapter": "操縦者・運航体制", "stem": "飛行とアルコール・睡眠について、誤っているものを1つ選びなさい。", "options": ["飲酒後はアルコールが体内から抜けるまで時間を要するため、飛行前の飲酒は避ける。", "睡眠不足は注意力・判断力を低下させる。", "飲酒しても十分な睡眠をとれば、体内のアルコールは即座に消失する。"], "answer": 3, "explanation": "体内のアルコールが分解されるには相応の時間がかかり、睡眠によって即座に消失するものではない。睡眠不足もパフォーマンスを低下させる。"}, {"id": 139, "chapter": "操縦者・運航体制", "stem": "CRM（クルー・リソース・マネジメント）における意思決定について、正しいものを1つ選びなさい。", "options": ["意思決定は操縦者一人で行い、補助者の情報は参考にしない。", "不確実な状況でも、計画どおりの飛行を続けることが最優先される。", "状況を正しく認識し、関係者で情報を共有して適切な意思決定を行う。"], "answer": 3, "explanation": "CRMでは状況認識と情報共有に基づく適切な意思決定が重視される。不確実な状況では飛行の中止・延期を含めて柔軟に判断する。"}, {"id": 140, "chapter": "操縦者・運航体制", "stem": "補助者の配置場所や人数について、誤っているものを1つ選びなさい。", "options": ["補助者は、機体や周囲の状況、進入路を視認できる位置に配置する。", "補助者は常に1名と定められており、飛行範囲が広くても増やしてはならない。", "目視外飛行など必要に応じて、複数の補助者を適切に配置する。"], "answer": 2, "explanation": "補助者の人数や配置は飛行の態様やリスクに応じて決めるものであり、広範囲や目視外飛行では複数の配置が有効である。補助者は機体や進入路を視認できる位置に配置する。"}, {"id": 141, "chapter": "操縦者・運航体制", "stem": "運航時の確認事項について、正しいものを1つ選びなさい。", "options": ["飛行前にバッテリー残量、気象、周囲の状況、通信状態等を確認する。", "確認はバッテリー残量だけで十分である。", "周囲の状況は飛行中に確認すればよく、飛行前の確認は不要である。"], "answer": 1, "explanation": "運航時にはバッテリー・機体の状態、気象、周囲の人や障害物、通信状態など多面的な確認を飛行前から継続的に行う必要がある。"}, {"id": 142, "chapter": "リスク管理", "stem": "安全に配慮した飛行について、誤っているものを1つ選びなさい。", "options": ["バッテリー残量や飛行可能時間に余裕をもって飛行する。", "障害物や第三者との間に十分な余裕（距離・高度）を確保する。", "機体の性能の限界ぎりぎりまで使い切る飛行が、効率的で望ましい。"], "answer": 3, "explanation": "性能の限界ぎりぎりの運用は不測の事態への余裕を失わせる。バッテリーや距離・高度に余裕をもった安全側の運航が望ましい。"}, {"id": 143, "chapter": "リスク管理", "stem": "飛行計画における中止基準について、正しいものを1つ選びなさい。", "options": ["風速や視程など、飛行を中止・延期する判断基準をあらかじめ定めておく。", "一度立てた計画は、悪天候でも必ず実行しなければならない。", "中止の判断は現場では行わず、すべて事後に検討する。"], "answer": 1, "explanation": "飛行計画では、風速・視程・降雨等について中止・延期の判断基準をあらかじめ定めておき、現場の状況に応じて飛行を中止する判断ができるようにする。"}, {"id": 144, "chapter": "リスク管理", "stem": "運航におけるハザード（危険源）の例について、誤っているものを1つ選びなさい。", "options": ["障害物が視界内にあっても、操縦者が認識していればハザードではなくなる。", "電線や鉄塔、樹木、建物などはハザードとなり得る。", "鳥などの動物の接近もハザードとなり得る。"], "answer": 1, "explanation": "電線・樹木・建物・鳥などは、認識の有無にかかわらず接触・衝突の危険を生じさせ得る危険源（ハザード）である。認識しているからといってハザードでなくなるわけではない。"}, {"id": 145, "chapter": "リスク管理", "stem": "リスクの受容（許容）について、正しいものを1つ選びなさい。", "options": ["どれほど大きなリスクでも、許可さえあれば飛行してよい。", "低減策を講じてもなお残るリスクが許容できる水準かを評価し、飛行の可否を判断する。", "リスクが少しでもあれば、いかなる飛行も実施できない。"], "answer": 2, "explanation": "リスク低減策を講じた後の残留リスクが許容できる水準かを評価し、許容できなければ計画の見直しや中止を判断する。"}, {"id": 146, "chapter": "リスク管理", "stem": "気象の重要性について、誤っているものを1つ選びなさい。", "options": ["気象は無人航空機の飛行の安全に大きく影響する重要な要素である。", "小型の機体であれば、気象の影響を受けないため確認は不要である。", "飛行可否の判断には、気象情報の確認が欠かせない。"], "answer": 2, "explanation": "小型機はむしろ風等の気象の影響を受けやすい。機体の大小にかかわらず、気象情報の確認と影響の評価は飛行可否判断に欠かせない。"}, {"id": 147, "chapter": "リスク管理", "stem": "風が飛行に及ぼす影響について、正しいものを1つ選びなさい。", "options": ["追い風のときは機体が減速するため、距離を稼げない。", "横風は機体の進路に影響しない。", "向かい風・追い風・横風により、機体の対地速度や進路が変化する。"], "answer": 3, "explanation": "風は機体の対地速度や進路に影響する。向かい風では対地速度が落ち、追い風では増す。横風は機体を流すため進路の補正が必要となる。"}, {"id": 148, "chapter": "リスク管理", "stem": "降雪や着氷のリスクについて、誤っているものを1つ選びなさい。", "options": ["雪は軽いため、機体やプロペラに付着しても飛行性能に影響しない。", "降雪時は視程の悪化や機体への着雪・着氷が生じ得る。", "機体やプロペラへの着氷は、重量増加や推力低下を招く。"], "answer": 1, "explanation": "着雪・着氷は重量増加やプロペラ形状の変化による推力低下、機器の不具合を招き、飛行性能に影響する。降雪時は視程悪化のリスクもある。"}, {"id": 149, "chapter": "リスク管理", "stem": "マルチローターの運航リスクについて、正しいものを1つ選びなさい。", "options": ["ローターが複数あるため、いくつ故障しても安全に飛行できる。", "モーターやプロペラの1つの不具合でも、機体が不安定になり墜落につながり得る。", "マルチローターは構造が単純なため、点検・整備は不要である。"], "answer": 2, "explanation": "一般的なマルチローターはモーター・プロペラの不具合により姿勢を崩しやすく墜落につながり得るため、各部の点検・整備が重要である。"}, {"id": 150, "chapter": "リスク管理", "stem": "目視外飛行の運航リスクについて、誤っているものを1つ選びなさい。", "options": ["目視外飛行は操縦者が機体を見ないため、事前の経路確認は不要である。", "電波状況の悪化により通信が途絶するリスクがある。", "経路上の障害物や第三者を見落とすリスクがある。"], "answer": 1, "explanation": "目視外飛行では機体を直接視認できないからこそ、事前の経路確認、電波状況の把握、補助者配置等のリスク管理が一層重要となる。"}, {"id": 151, "chapter": "規則", "stem": "学科試験の実施方法について、正しいものを1つ選びなさい。", "options": ["学科試験は、記述式の筆記で実施される。", "学科試験は口頭試問で実施される。", "学科試験は、全国の会場でコンピュータを用いるCBT方式で実施される。"], "answer": 3, "explanation": "学科試験は全国の試験会場でコンピュータを利用するCBT（Computer Based Testing）方式の三肢択一式で実施される。"}, {"id": 152, "chapter": "規則", "stem": "二等無人航空機操縦士の学科試験の科目について、誤っているものを1つ選びなさい。", "options": ["「無人航空機に関する規則」が科目に含まれる。", "二等の科目には、一等と同様に飛行性能の詳細な計算が必ず含まれる。", "「運航上のリスク管理」が科目に含まれる。"], "answer": 2, "explanation": "二等の科目は一等の科目から「飛行性能」及び「飛行性能の基本的な計算」並びにカテゴリーⅢにおけるリスク評価を除いたものとされており、飛行性能の詳細な計算は二等の対象から外れている。"}, {"id": 153, "chapter": "規則", "stem": "登録講習機関の修了審査について、正しいものを1つ選びなさい。", "options": ["登録講習機関で修了審査に合格すると、指定試験機関の実地試験が免除される。", "修了審査に合格しても、学科試験まで免除されることはない。", "登録講習機関での講習は法令上認められていない。"], "answer": 1, "explanation": "登録講習機関で所定の講習を受け修了審査に合格すると、指定試験機関で行う実地試験が免除される（学科試験は別途必要）。"}, {"id": 154, "chapter": "規則", "stem": "飛行可能な空域や登録情報の確認について、誤っているものを1つ選びなさい。", "options": ["ドローン情報基盤システム（DIPS）等を用いて手続きや情報の確認ができる。", "飛行空域や規制は確認する手段がないため、勘で判断するしかない。", "地図上で飛行が制限される空域（DID等）を確認できる仕組みがある。"], "answer": 2, "explanation": "DIPSや地理院地図等を用いてDIDや空港周辺等の制限空域を確認でき、飛行計画の通報や許可・承認の申請も行える。勘で判断するものではない。"}, {"id": 155, "chapter": "規則", "stem": "物件投下と危険物輸送の区別について、正しいものを1つ選びなさい。", "options": ["危険物を投下する場合は、危険物輸送にのみ該当し物件投下には当たらない。", "飛行中に物件を投下する行為は物件投下、危険物を積んで運ぶ行為は危険物輸送として、いずれも特定飛行に該当する。", "物件投下も危険物輸送も特定飛行には該当しない。"], "answer": 2, "explanation": "無人航空機からの物件投下と危険物の輸送はいずれも特定飛行に該当する。危険物を投下する場合は双方の規定が関係し得る。"}, {"id": 156, "chapter": "規則", "stem": "飛行の許可・承認を受けて特定飛行を行う際の遵守事項について、誤っているものを1つ選びなさい。", "options": ["許可・承認の際に付された条件を守って飛行する。", "許可・承認を受ければ、その内容や付された条件にかかわらず自由に飛行してよい。", "許可・承認に係る書類を、飛行時に確認・提示できるようにしておく。"], "answer": 2, "explanation": "許可・承認には条件が付されることがあり、これを遵守して飛行する必要がある。許可書等の書類は、飛行時に確認・提示できるようにしておく。"}, {"id": 157, "chapter": "規則", "stem": "リモートIDの方式について、正しいものを1つ選びなさい。", "options": ["リモートIDには、機体に組み込まれた内蔵型と、後から取り付ける外付型がある。", "リモートIDは外付型しか認められていない。", "リモートIDは機体ごとに発信内容を任意に変更してよい。"], "answer": 1, "explanation": "リモートIDには内蔵型と外付型があり、いずれも所定の基準を満たす必要がある。発信する識別情報を任意に偽ることは認められない。"}, {"id": 158, "chapter": "規則", "stem": "機体認証に係る使用の条件について、誤っているものを1つ選びなさい。", "options": ["機体認証では、その機体を安全に使用するための条件（使用の条件）が定められることがある。", "機体認証を受ければ、使用条件にかかわらずあらゆる飛行を自由に行える。", "機体ごとに定められた飛行マニュアル等に従って運用する。"], "answer": 2, "explanation": "機体認証には使用の条件が付されることがあり、定められた条件や飛行マニュアル等に従って運用する必要がある。"}, {"id": 159, "chapter": "規則", "stem": "技能証明の受験資格について、正しいものを1つ選びなさい。", "options": ["年齢にかかわらず誰でも技能証明を取得できる。", "技能証明は日本国籍を有する者しか受験できない。", "技能証明の試験には、一定の年齢（16歳以上）等の受験資格がある。"], "answer": 3, "explanation": "技能証明の試験には16歳以上等の受験資格が定められている。"}, {"id": 160, "chapter": "規則", "stem": "事故発生時の現場での対応について、誤っているものを1つ選びなさい。", "options": ["負傷者の救護や危険防止の措置を最優先で行う。", "再発防止のため、飛行ログや状況の記録を残す。", "事故原因の調査に支障が出ても、現場をただちに片付けてよい。"], "answer": 3, "explanation": "事故の原因究明や再発防止のため、可能な範囲で現場の状況や記録を保全することが望ましい。まずは人の安全確保を最優先する。"}, {"id": 161, "chapter": "規則", "stem": "空港周辺の表面（進入表面等）について、正しいものを1つ選びなさい。", "options": ["空港の表面は地表のことを指し、上空の飛行には関係しない。", "空港周辺には進入表面・水平表面等が設定され、その上空での飛行は制限される。", "進入表面の上空は、高度150m未満なら自由に飛行できる。"], "answer": 2, "explanation": "空港等の周辺には航空機の安全のため進入表面・水平表面・転移表面等が設定されており、その上空での飛行は高度にかかわらず制限される。"}, {"id": 162, "chapter": "規則", "stem": "電波の混信・干渉への対応について、誤っているものを1つ選びなさい。", "options": ["同一周波数帯を使う機器が多い場所では、混信・干渉のリスクが高まる。", "飛行前に周囲の電波環境を確認することが望ましい。", "混信が生じても操縦に影響しないため、特に対策は不要である。"], "answer": 3, "explanation": "混信・干渉は通信の不安定化や制御不能を招き得るため、周囲の電波環境を確認し、影響が懸念される場合は飛行を控えるなどの対策が必要である。"}, {"id": 163, "chapter": "規則", "stem": "撮影に伴うプライバシー等への配慮について、正しいものを1つ選びなさい。", "options": ["他人の容ぼうや私有地内の様子を写し込む場合は、プライバシーや肖像権への配慮が必要である。", "上空からの撮影は、何を写してもプライバシーの問題は生じない。", "撮影した映像は誰でも自由に公開してよい。"], "answer": 1, "explanation": "無人航空機による撮影では、他人の容ぼうや私生活、私有地の様子等が写り込むことがあり、プライバシー・肖像権・個人情報保護への配慮が求められる。"}, {"id": 164, "chapter": "規則", "stem": "地方公共団体の条例等（ローカルルール）について、誤っているものを1つ選びなさい。", "options": ["公園や河川敷等で、条例や管理者のルールにより飛行が制限される場合がある。", "飛行予定地のローカルルールを事前に確認することが望ましい。", "航空法の規制を満たしていれば、地方公共団体の条例は無視してよい。"], "answer": 3, "explanation": "航空法の規制とは別に、公園・河川・施設等で条例や管理者のルールにより飛行が制限される場合があり、これらにも従う必要がある。"}, {"id": 165, "chapter": "規則", "stem": "緊急用務空域の確認について、正しいものを1つ選びなさい。", "options": ["一度確認すれば、その後は変更されないため再確認は不要である。", "緊急用務空域は随時設定・変更されるため、飛行前に国土交通省の情報等で確認する。", "緊急用務空域は無人航空機には関係がない。"], "answer": 2, "explanation": "緊急用務空域は災害等に応じて随時設定・解除されるため、飛行のたびに最新の情報を確認し、指定されている場合は飛行を控える。"}, {"id": 166, "chapter": "規則", "stem": "許可・承認を要しない飛行における手続きについて、誤っているものを1つ選びなさい。", "options": ["特定飛行に該当しないカテゴリーⅠの飛行では、許可・承認は不要である。", "立入管理措置等の条件を満たし、許可・承認が不要となる特定飛行もある。", "立入管理措置等により許可・承認が不要となる特定飛行では、飛行計画の通報や飛行日誌の作成も不要となる。"], "answer": 3, "explanation": "許可・承認が不要となる特定飛行（カテゴリーⅡの一部）であっても、特定飛行である以上、飛行計画の通報や飛行日誌の作成は必要である。許可・承認の要否と、通報・記録の要否は別である。"}, {"id": 167, "chapter": "規則", "stem": "無人航空機に関する各種手続きについて、正しいものを1つ選びなさい。", "options": ["機体の登録や飛行計画の通報、許可・承認の申請等は、オンラインの情報基盤システムを通じて行える。", "すべての手続きは書面を郵送する方法でしか行えない。", "手続きの種類ごとに全く別個の制度で、一元的な確認はできない。"], "answer": 1, "explanation": "ドローン情報基盤システム（DIPS）等を通じて、登録・飛行計画通報・許可承認申請・飛行日誌等の手続きをオンラインで行うことができる。"}, {"id": 168, "chapter": "規則", "stem": "無人航空機の飛行禁止空域と飛行の方法の関係について、誤っているものを1つ選びなさい。", "options": ["飛行の方法に関する規制さえ守れば、飛行する空域の規制は考えなくてよい。", "「飛行する空域」に関する規制（空港周辺・DID・150m以上等）がある。", "「飛行の方法」に関する規制（夜間・目視外・30m接近・催し物上空・危険物・物件投下等）がある。"], "answer": 1, "explanation": "特定飛行は「飛行する空域」と「飛行の方法」の両面で定められており、両方を確認して必要な手続きを行う必要がある。"}, {"id": 169, "chapter": "規則", "stem": "立入管理措置を講じない飛行（補助者なし等）について、正しいものを1つ選びなさい。", "options": ["立入管理措置を講じない飛行は、二等技能証明だけで自由に行える。", "立入管理措置を講じずに第三者の上空を飛行することは、よりリスクが高くカテゴリーⅢに該当する。", "立入管理措置は飛行の安全と無関係である。"], "answer": 2, "explanation": "立入管理措置を講じず第三者上空を飛行するカテゴリーⅢはリスクが高く、第一種機体認証や一等技能証明等が必要となる。"}, {"id": 170, "chapter": "規則", "stem": "無人航空機の運航のルール全般について、誤っているものを1つ選びなさい。", "options": ["飲酒や薬物の影響下での飛行は禁止されている。", "飛行前の確認、飛行中の周囲の監視等が遵守事項として求められる。", "一度ルールを覚えれば、制度改正があっても確認し直す必要はない。"], "answer": 3, "explanation": "法令や制度は改正されることがあるため、常に最新の情報を確認することが求められる。飲酒・薬物下の飛行禁止や飛行前後の確認等は基本的な遵守事項である。"}, {"id": 171, "chapter": "システム", "stem": "固定翼機（飛行機型）の特徴について、正しいものを1つ選びなさい。", "options": ["空中で静止（ホバリング）するのが得意である。", "一般に長距離・広範囲の飛行に適し、滑空が可能である。", "速度を落としても失速することはない。"], "answer": 2, "explanation": "固定翼機は揚抗比に優れ長距離・広範囲の飛行に適し、動力を失っても滑空できる。一方でホバリングは不得手で、速度が失速速度を下回ると揚力を失う。"}, {"id": 172, "chapter": "システム", "stem": "ヘリコプター型（シングルローター）の特徴について、誤っているものを1つ選びなさい。", "options": ["ローターが1つのため、反トルクは発生しない。", "メインローターの反トルクを打ち消すため、テールローター等の機構をもつことが多い。", "ホバリングや低速での精密な飛行に適する。"], "answer": 1, "explanation": "シングルローター機ではメインローターの回転による反トルクが発生し、これを打ち消すためにテールローター等の機構を備える。"}, {"id": 173, "chapter": "システム", "stem": "マルチローターのローター数と冗長性について、正しいものを1つ選びなさい。", "options": ["ローター数は飛行の安定性や冗長性に影響しない。", "ヘキサコプターやオクトコプター等はローター数が多く、一部停止時の冗長性が高まる場合がある。", "クアッドコプターは1基停止しても必ず安定して飛行できる。"], "answer": 2, "explanation": "ローター数の多い機体（ヘキサ・オクト等）は一部のモーター停止時にも姿勢を維持しやすく冗長性が高まる場合がある。クアッド（4基）は1基停止で安定維持が難しいことが多い。"}, {"id": 174, "chapter": "システム", "stem": "ローターが生む下向きの気流（ダウンウォッシュ）について、誤っているものを1つ選びなさい。", "options": ["ローターは下向きの気流を生み出し、その反作用で揚力を得る。", "地面付近では気流の跳ね返りにより機体の挙動が変化することがある。", "ダウンウォッシュは周囲に一切影響を与えない。"], "answer": 3, "explanation": "ダウンウォッシュは砂塵を巻き上げたり、近くの人や物に風圧を与えたりするほか、地面付近では跳ね返りにより機体挙動に影響する。"}, {"id": 175, "chapter": "システム", "stem": "テレメトリ（機体から地上への情報）について、正しいものを1つ選びなさい。", "options": ["テレメトリは操縦の指令を機体に送る仕組みである。", "テレメトリ情報は飛行の安全に役立たない。", "機体の位置・高度・速度・バッテリー残量等の情報を地上に伝える仕組みである。"], "answer": 3, "explanation": "テレメトリは機体の状態（位置・高度・速度・電圧・電波強度等）を地上の操縦者に伝える仕組みで、状況把握と安全判断に役立つ。"}, {"id": 176, "chapter": "システム", "stem": "バッテリーの放電能力（C定数）について、誤っているものを1つ選びなさい。", "options": ["C定数は安全に関係しないため、確認する必要はない。", "C定数はバッテリーが流せる電流の能力の目安を表す。", "機体の要求する電流に対し、放電能力が不足すると電圧降下や性能低下を招く。"], "answer": 1, "explanation": "C定数（放電能力）が不足すると必要な電流を供給できず、電圧降下や出力低下、過熱を招くため、機体の要求に合ったバッテリー選定が重要である。"}, {"id": 177, "chapter": "システム", "stem": "モーターの発熱について、正しいものを1つ選びなさい。", "options": ["モーターは発熱しないため、温度の確認は不要である。", "モーターは熱くなるほど効率が上がり、性能が向上する。", "モーターは高負荷の連続使用等で発熱し、過熱は故障や出力低下の原因となる。"], "answer": 3, "explanation": "モーターは負荷に応じて発熱し、過熱は性能低下や故障の原因となる。飛行後にモーターの異常な発熱がないか確認することが望ましい。"}, {"id": 178, "chapter": "システム", "stem": "各種センサのキャリブレーションについて、誤っているものを1つ選びなさい。", "options": ["加速度センサやコンパス等は、必要に応じて校正（キャリブレーション）を行う。", "キャリブレーションは、平らで磁気の影響が少ない場所で行うことが望ましい。", "キャリブレーションは一切不要で、機体は常に正確に動作する。"], "answer": 3, "explanation": "センサは経時変化や環境の影響を受けるため、必要に応じて適切な環境でキャリブレーションを行うことで、正確な姿勢・方位の制御につながる。"}, {"id": 179, "chapter": "システム", "stem": "無人航空機が用いる電波の用途について、正しいものを1つ選びなさい。", "options": ["操縦と映像は必ず同じ周波数で行わなければならない。", "電波は1つの周波数しか使えない。", "操縦用の電波と、映像伝送用の電波で、異なる周波数帯が用いられることがある。"], "answer": 3, "explanation": "操縦用（例：2.4GHz帯）と映像伝送用（例：5.7GHz帯等）で異なる周波数帯を用いることがあり、用途や使用には法令上の条件が伴う場合がある。"}, {"id": 180, "chapter": "システム", "stem": "GNSS受信機の測位までの時間について、誤っているものを1つ選びなさい。", "options": ["電源投入後、十分な数の衛星を捕捉するまで測位が安定しないことがある。", "電源を入れた瞬間から常に高精度の測位が得られる。", "測位が安定する前に飛行を開始すると、位置保持が不安定になるおそれがある。"], "answer": 2, "explanation": "GNSSは電源投入後、衛星を捕捉し測位が安定するまで時間を要することがある。測位が安定する前の飛行開始は位置保持の不安定化を招くおそれがある。"}, {"id": 181, "chapter": "システム", "stem": "機体の防水・防塵性能について、正しいものを1つ選びなさい。", "options": ["機体の防水・防塵性能には限界があり、仕様を超える環境での使用は故障の原因となる。", "すべての機体は完全防水で、水中でも使用できる。", "防塵性能があれば、砂塵の中でも一切の影響を受けない。"], "answer": 1, "explanation": "機体の防水・防塵性能には仕様上の限界があり、これを超える環境（豪雨や砂塵等）での使用は浸水・故障の原因となるため、仕様の範囲内で運用する。"}, {"id": 182, "chapter": "システム", "stem": "部品の交換時期について、誤っているものを1つ選びなさい。", "options": ["部品は壊れるまで使い続けるのが最も安全である。", "プロペラやバッテリー等の消耗部品は、メーカーの指定や状態に応じて交換する。", "交換・整備の記録を残しておくことが望ましい。"], "answer": 1, "explanation": "消耗部品は破損する前に、メーカー指定の時期や劣化の状態に応じて計画的に交換することが安全につながる。交換・整備の記録も残しておく。"}, {"id": 183, "chapter": "操縦者・運航体制", "stem": "操縦者の責任の範囲について、正しいものを1つ選びなさい。", "options": ["操縦者は、飛行を開始してから終了するまでの全般について責任を負う。", "飛行中の責任は補助者が負い、操縦者は責任を負わない。", "操縦者の責任は離陸の瞬間だけである。"], "answer": 1, "explanation": "操縦者は飛行の開始から終了まで、安全に飛行を成し遂げる全般的な責任を負う。"}, {"id": 184, "chapter": "操縦者・運航体制", "stem": "機体の紛失・盗難等への備えについて、誤っているものを1つ選びなさい。", "options": ["セキュリティ対策は飛行の安全と無関係なので不要である。", "機体や送信機の保管・管理を適切に行い、盗難や不正利用を防ぐ。", "機体やデータには、必要に応じてパスワード等の保護を施す。"], "answer": 1, "explanation": "機体・送信機・データの管理は、不正利用や情報漏えい、乗っ取り等を防ぐうえで重要であり、運航の安全やプライバシー保護にも関わる。"}, {"id": 185, "chapter": "操縦者・運航体制", "stem": "ホバリングの安定について、正しいものを1つ選びなさい。", "options": ["風やGPSの受信状況により、ホバリング位置がずれる（流される）ことがある。", "ホバリング中は外的要因の影響を一切受けない。", "風が強いほどホバリングは安定する。"], "answer": 1, "explanation": "ホバリングは風やGPSの受信状況の影響を受け、位置がずれることがある。風が強いほど位置保持は難しくなる。"}, {"id": 186, "chapter": "操縦者・運航体制", "stem": "基本的な操縦操作について、誤っているものを1つ選びなさい。", "options": ["離陸・上昇・旋回・下降・着陸といった一連の操作に習熟しておく。", "基本操作は自動で行われるため、操縦者が習熟する必要はない。", "機体の向きが操縦者と逆を向いたとき（対面飛行）の操作にも慣れておく。"], "answer": 2, "explanation": "離着陸や旋回、対面飛行時の操作など、基本操作への習熟は緊急時にも安全に対応するための基礎であり、操縦者が身につけておく必要がある。"}, {"id": 187, "chapter": "操縦者・運航体制", "stem": "緊急着陸（不時着）の判断について、正しいものを1つ選びなさい。", "options": ["異常があっても、予定地点まで飛行を続けることを最優先する。", "緊急着陸は第三者の有無を考えず、どこへ降ろしてもよい。", "機体やバッテリーの異常時には、被害を最小化できる場所への速やかな着陸を検討する。"], "answer": 3, "explanation": "異常発生時は、第三者や物件への被害を最小化できる場所を選び、速やかに着陸（不時着）させる判断が求められる。"}, {"id": 188, "chapter": "操縦者・運航体制", "stem": "飛行時間の管理と休憩について、誤っているものを1つ選びなさい。", "options": ["集中していれば、何時間連続して操縦しても問題ない。", "長時間の連続した操縦は集中力の低下を招くため、適切に休憩をとる。", "体調や疲労に応じて飛行の計画を調整する。"], "answer": 1, "explanation": "長時間の連続操縦は疲労や集中力低下を招くため、適切な休憩や交代、無理のない計画で対応する必要がある。"}, {"id": 189, "chapter": "操縦者・運航体制", "stem": "一人で運航する場合の資源管理（SRM）について、正しいものを1つ選びなさい。", "options": ["一人で飛行する場合は、安全管理の考え方は不要である。", "一人運航では、情報を確認する余裕がないため判断は勘に頼ってよい。", "操縦者が一人の場合でも、利用できる情報・機器・時間等を活用して安全に意思決定する考え方が重要である。"], "answer": 3, "explanation": "SRM（シングルパイロット・リソース・マネジメント）は、一人で運航する際にも利用可能な資源を活用して状況を認識し、適切に意思決定するための考え方である。"}, {"id": 190, "chapter": "操縦者・運航体制", "stem": "複数の操縦者がいる場合の役割分担について、誤っているものを1つ選びなさい。", "options": ["誰がその飛行の操縦者であるかを、飛行前に明確にしておく。", "操縦の交代を行う場合は、手順や合図を事前に取り決めておく。", "複数いれば、誰が操縦しているか曖昧でも問題ない。"], "answer": 3, "explanation": "技能証明保有者が複数いる場合は、誰が操縦者かを飛行前に明確にし、交代の手順等を取り決めておくことが安全につながる。"}, {"id": 191, "chapter": "操縦者・運航体制", "stem": "飛行後の対応について、正しいものを1つ選びなさい。", "options": ["飛行後に機体の状態を点検し、飛行記録や不具合を記録しておく。", "飛行後は機体を片付けるだけでよく、点検や記録は不要である。", "不具合があっても、次の飛行に支障がなければ記録しなくてよい。"], "answer": 1, "explanation": "飛行後の点検と記録は、機体の状態把握や次回飛行への備え、原因究明に役立つため重要である。"}, {"id": 192, "chapter": "リスク管理", "stem": "飛行経路の高度設定について、誤っているものを1つ選びなさい。", "options": ["障害物（電線・樹木・建物等）との間に十分な高度の余裕を確保する。", "必要以上に低い高度での飛行は、障害物との衝突リスクを高める。", "高度はできるだけ低くするほど、常に安全である。"], "answer": 3, "explanation": "低すぎる高度は障害物や第三者との衝突リスクを高める。一方で高度150m以上等の制限もあるため、障害物との余裕を確保しつつ規制内で適切な高度を選ぶ。"}, {"id": 193, "chapter": "リスク管理", "stem": "リスクの大きさの見積りについて、正しいものを1つ選びなさい。", "options": ["リスクは、被害の重大性と発生の可能性の両面から評価する。", "発生可能性が低ければ、被害が甚大でも考慮しなくてよい。", "リスクは被害の重大性のみで決まり、発生可能性は関係ない。"], "answer": 1, "explanation": "リスクは「被害の重大性」と「発生の可能性」を組み合わせて評価し、重大かつ起こり得るものから優先的に対策する。"}, {"id": 194, "chapter": "リスク管理", "stem": "気象状況と機体性能を踏まえた飛行可否の判断について、誤っているものを1つ選びなさい。", "options": ["当日の風速が機体の耐風性能を上回っていても、短時間であれば飛行してよい。", "当日の風速を機体の耐風性能（許容風速）と比較して飛行の可否を判断する。", "突風が予想される場合は、平均風速に余裕をみて判断する。"], "answer": 1, "explanation": "当日の風速が機体の耐風性能（許容風速）を超える場合は、短時間であっても飛行を控えるべきである。突風を考慮し、平均風速に余裕をもって可否を判断する。"}, {"id": 195, "chapter": "リスク管理", "stem": "天気の崩れと気圧配置について、正しいものを1つ選びなさい。", "options": ["前線の通過時等は、風や雨が急変することがあるため注意する。", "気圧配置は飛行に無関係なので、確認する必要はない。", "晴れの予報であれば、天気が急変することは絶対にない。"], "answer": 1, "explanation": "前線の通過や気圧配置の変化に伴い、風・雨・雷等が急変することがあるため、気象の推移に注意して飛行可否を判断する。"}, {"id": 196, "chapter": "リスク管理", "stem": "日射や地表の状態による気流について、誤っているものを1つ選びなさい。", "options": ["日射で地表が暖められると、上昇気流が生じることがある。", "日射や地表の状態は気流に影響しないため、考慮する必要はない。", "地表の状態（アスファルト・水面・草地等）により気流の生じ方が異なる。"], "answer": 2, "explanation": "日射により暖められた地表からは上昇気流が生じることがあり、地表の状態によって気流の生じ方が異なるため、機体の挙動に影響し得る。"}, {"id": 197, "chapter": "リスク管理", "stem": "固定翼機の運航リスクについて、正しいものを1つ選びなさい。", "options": ["固定翼機は任意の地点に垂直に着陸できるため、着陸場所の制約は小さい。", "固定翼機は速度を落とすほど安全に飛行できる。", "固定翼機は着陸に一定の距離や速度を要し、ホバリングでの精密な着陸が難しい。"], "answer": 3, "explanation": "固定翼機は失速速度以上の速度を保つ必要があり、着陸には一定の距離・速度を要する。垂直着陸やホバリングは不得手で、着陸場所の確保が課題となる。"}, {"id": 198, "chapter": "リスク管理", "stem": "ヘリコプター型・回転翼機の運航リスクについて、誤っているものを1つ選びなさい。", "options": ["回転翼機は構造が単純で、いかなる故障でも安全に着陸できる。", "回転するローターは人や物に接触すると大きな危害を与えるおそれがある。", "動力喪失時の挙動（オートローテーション等）の特性を理解しておく。"], "answer": 1, "explanation": "回転翼機は動力やローター系の故障により安全な着陸が困難になる場合がある。ローターは接触時の危害も大きいため、特性の理解と慎重な運用が必要である。"}, {"id": 199, "chapter": "リスク管理", "stem": "夜間飛行の準備について、正しいものを1つ選びなさい。", "options": ["夜間飛行では、機体の灯火や飛行経路・障害物を明るいうちに確認しておくとよい。", "夜間は暗くて確認できないため、準備は不要である。", "夜間飛行は昼間と全く同じ準備でよい。"], "answer": 1, "explanation": "夜間飛行では視認性が低下するため、明るいうちに飛行経路や障害物を確認し、灯火や照明等を準備しておくことが安全につながる。"}, {"id": 200, "chapter": "リスク管理", "stem": "安全運航のための意思決定について、誤っているものを1つ選びなさい。", "options": ["危険が予想される場合は、飛行を中止・延期する判断（中止する勇気）が重要である。", "危険を察知して事前に回避することは、危険な状況を乗り切ることよりも重要である。", "一度計画した飛行は、危険が予想されても必ず実行すべきである。"], "answer": 3, "explanation": "安全運航では、危険を事前に察知して回避し、必要に応じて飛行を中止・延期する判断が最も重要であり、計画の実行を優先して危険を冒すべきではない。"}];
const CHAPTERS=[
  {key:'規則', no:'第1章', name:'無人航空機に関する規則'},
  {key:'システム', no:'第2章', name:'無人航空機のシステム'},
  {key:'操縦者・運航体制', no:'第3章', name:'無人航空機の操縦者及び運航体制'},
  {key:'リスク管理', no:'第4章', name:'運航上のリスク管理'},
];
const THEMES={blue:'#2563eb', teal:'#0d9488', orange:'#ea580c'};
const SOFT={blue:'#dbeafe', teal:'#ccfbf1', orange:'#ffedd5'};
const RING_C=314.16;

const LS={ get:(k,d)=>{ try{ const v=JSON.parse(localStorage.getItem(k)); return v==null?d:v; }catch(e){ return d; } },
           set:(k,v)=>localStorage.setItem(k,JSON.stringify(v)) };
let settings = LS.get('dq_settings', {num:10, shuffleOpts:true, shuffleQs:true});
let progress = LS.get('dq_progress', {});   // {id:{a,c,last:'o'|'x'}}
let theme    = LS.get('dq_theme','blue');

let session=[], idx=0, score=0, sessionWrong=[], lastSession=null, isTest=false;
let testRound=1, testFirstScore=0, testFirstDetail=null;

function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function $(id){ return document.getElementById(id); }

/* ---- theme ---- */
function applyTheme(t){
  theme=t; LS.set('dq_theme',t);
  document.documentElement.style.setProperty('--accent',THEMES[t]);
  document.documentElement.style.setProperty('--accent-soft',SOFT[t]);
  document.querySelectorAll('.dot').forEach(d=>d.classList.toggle('active', d.dataset.t===t));
}

/* ---- metrics ---- */
const seenCount=()=>Object.keys(progress).length;
const lastOk=()=>Object.values(progress).filter(p=>p.last==='o').length;
const wrongIds=()=>Object.keys(progress).filter(k=>progress[k].last==='x').map(Number);
const accuracy=()=>{ const s=seenCount(); return s?Math.round(lastOk()/s*100):0; };
function chapStat(key){
  const all=DATA.filter(q=>q.chapter===key);
  const learned=all.filter(q=>progress[q.id]);
  const weak=learned.filter(q=>progress[q.id].last==='x').length;
  return {total:all.length, learned:learned.length, weakPct: learned.length?Math.round(weak/learned.length*100):0};
}

/* ---- dashboard render ---- */
function renderHome(){
  const acc=accuracy();
  $('accPct').textContent=acc+'%';
  $('ring').style.strokeDashoffset = RING_C*(1-acc/100);
  $('seen').innerHTML=seenCount()+'<small> / 200</small>';
  $('lastok').textContent=lastOk();
  $('todo').textContent=wrongIds().length;

  $('chaps').innerHTML = CHAPTERS.map(c=>{
    const s=chapStat(c.key);
    return '<button class="chap" onclick="startChapter(\''+c.key+'\')">'+
      '<div class="row1"><span class="badge">'+c.no+'</span><span class="nm">'+esc(c.name)+'</span>'+
        '<span class="weak">苦手 '+s.weakPct+'%</span></div>'+
      '<div class="meta2">全'+s.total+'問 ・ 学習'+s.learned+'問</div>'+
      '<div class="pbar"><div class="track"><div class="fill" style="width:'+s.weakPct+'%"></div></div>'+
        '<span class="pct">'+s.weakPct+'%</span></div>'+
    '</button>';
  }).join('');

  const rc=wrongIds().length;
  $('revDesc').textContent = rc>0 ? (rc+'問の間違いを復習') : '間違いはまだありません';
  $('qsReview').disabled = rc===0;

  document.querySelectorAll('#numSeg button').forEach(b=>b.classList.toggle('on', parseInt(b.dataset.n,10)===settings.num));
  $('shOpts').checked=settings.shuffleOpts;
  $('shQs').checked=settings.shuffleQs;
  renderTestCard();
}

/* ---- session build ---- */
function buildSession(pool, respectNum, forceSeq){
  pool=pool.slice();
  if(settings.shuffleQs && !forceSeq) shuffle(pool); else pool.sort((a,b)=>a.id-b.id);
  if(respectNum && settings.num>0) pool=pool.slice(0,settings.num);
  session = pool.map(q=>{
    let os=q.options.map((t,i)=>({t:t, c:(i+1)===q.answer}));
    if(settings.shuffleOpts) shuffle(os);
    return {id:q.id, chapter:q.chapter, stem:q.stem, explanation:q.explanation,
            opts:os.map(o=>o.t), ans:os.findIndex(o=>o.c)+1};
  });
  if(!session.length){ alert('対象の問題がありません。'); return false; }
  isTest=false; idx=0; score=0; sessionWrong=[];
  return true;
}

/* ---- 認定テスト（4科目×10問＝40問・全問正解で合格）---- */
function buildTest(){
  let pool=[];
  CHAPTERS.forEach(function(c){
    let qs=DATA.filter(function(q){return q.chapter===c.key;});
    shuffle(qs);
    pool=pool.concat(qs.slice(0,10));
  });
  shuffle(pool);
  session=pool.map(function(q){
    let os=q.options.map(function(t,i){return {t:t,c:(i+1)===q.answer};});
    shuffle(os);
    return {id:q.id,chapter:q.chapter,stem:q.stem,explanation:q.explanation,
            opts:os.map(function(o){return o.t;}),ans:os.findIndex(function(o){return o.c;})+1};
  });
  isTest=true; testRound=1; testFirstScore=0; testFirstDetail=null;
  idx=0; score=0; sessionWrong=[];
  return true;
}
/* ---- 認定テストの試行（attempt）履歴・中断再開 ---- */
function getHistory(){ return LS.get('dq_test_history',[]); }
function setHistory(h){ LS.set('dq_test_history',h); }
function completedCount(){ return getHistory().filter(function(h){return h.completed;}).length; }
function curAttempt(){ const h=getHistory(); const last=h[h.length-1]; return (last && !last.completed) ? last : null; }
function saveActiveTest(){
  if(!isTest) return;
  LS.set('dq_test_active', {session:session, idx:idx, score:score, sessionWrong:sessionWrong,
    testRound:testRound, testFirstScore:testFirstScore, testFirstDetail:testFirstDetail});
}
function clearActiveTest(){ try{ localStorage.removeItem('dq_test_active'); }catch(e){} }

function startTest(){
  // 進行中があれば確認（破棄して最初から）。試行番号は据え置き（中断は同じ回）
  const h=getHistory();
  const inProg = curAttempt();
  if(inProg){ if(!confirm('進行中の認定テスト（'+inProg.n+'回目）を最初からやり直しますか？\\n※ 回数は増えません。')) return; }
  const n = inProg ? inProg.n : (completedCount()+1);
  const rec = {n:n, first_score:null, detail:null, rounds:0, completed:false,
               completed_at:null, cur_round:1, answered:0, total:40, updated_at:new Date().toISOString()};
  if(inProg){ h[h.length-1]=rec; } else { h.push(rec); }
  setHistory(h);
  clearActiveTest();
  syncTest();
  lastSession=function(){return buildTest();};
  run();
}
function resumeTest(){
  const a=LS.get('dq_test_active',null); if(!a){ startTest(); return; }
  session=a.session; idx=a.idx; score=a.score; sessionWrong=a.sessionWrong;
  testRound=a.testRound; testFirstScore=a.testFirstScore; testFirstDetail=a.testFirstDetail;
  isTest=true; lastSession=function(){return buildTest();};
  show('quiz'); renderQ();
}
// 間違えた問題だけで次ラウンドを準備（B方式：その回で全問正解するまで反復）
function prepareNextRound(wrong){
  session=wrong.map(function(w){
    const q=DATA.find(function(d){return d.id===w.id;});
    let os=q.options.map(function(t,i){return {t:t,c:(i+1)===q.answer};});
    shuffle(os);
    return {id:q.id,chapter:q.chapter,stem:q.stem,explanation:q.explanation,
            opts:os.map(function(o){return o.t;}),ans:os.findIndex(function(o){return o.c;})+1};
  });
  shuffle(session);
  testRound++; idx=0; score=0; sessionWrong=[];
}
function goNextRound(){ show('quiz'); renderQ(); }
function startChapter(key){ lastSession=function(){return buildSession(DATA.filter(q=>q.chapter===key),true,false);}; run(); }
function startMini(){ lastSession=function(){return buildSession(DATA,true,false);}; run(); }
function startAll(){ lastSession=function(){return buildSession(DATA,false,false);}; run(); }
function startReview(){ const ids=wrongIds(); lastSession=function(){return buildSession(DATA.filter(q=>ids.indexOf(q.id)>=0),false,false);}; run(); }
function run(){ if(lastSession && lastSession()){ show('quiz'); renderQ(); } }
function retry(){ run(); }

/* ---- quiz play ---- */
function show(which){ ['home','quiz','result'].forEach(s=>$(s).classList.toggle('hide', s!==which)); window.scrollTo(0,0); }
function goHome(){ syncTest(); renderHome(); show('home'); }

function renderQ(){
  const q=session[idx];
  $('prog').textContent='第 '+(idx+1)+' / '+session.length+' 問';
  $('sc').textContent='正解 '+score;
  $('qfill').style.width=(idx/session.length*100)+'%';
  $('chip').textContent=q.chapter;
  $('stem').textContent=q.stem;
  const ow=$('opts'); ow.innerHTML='';
  q.opts.forEach((o,i)=>{
    const b=document.createElement('button');
    b.className='opt'; b.innerHTML='<span class="n">'+(i+1)+'</span>'+esc(o);
    b.onclick=function(){ answerQ(i+1,b); }; ow.appendChild(b);
  });
